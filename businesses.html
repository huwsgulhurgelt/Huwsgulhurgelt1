<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бизнес лавлах — Мөрөн</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Category pills ── */
        .cat-bar {
            padding: 24px 40px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .cat-btn {
            padding: 9px 18px;
            border-radius: 50px;
            border: 1.5px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.15);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.22s;
            font-family: inherit;
            color: inherit;
            backdrop-filter: blur(6px);
        }
        .cat-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .cat-btn.active {
            background: rgba(255,255,255,0.85);
            color: #111;
            border-color: transparent;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        /* ── Search ── */
        .search-section {
            padding: 24px 40px 10px;
        }
        .search-input {
            width: 100%;
            padding: 13px 18px;
            background: rgba(255,255,255,0.2);
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            font-size: 0.97rem;
            font-family: inherit;
            color: inherit;
            transition: all 0.25s;
            backdrop-filter: blur(6px);
        }
        .search-input::placeholder { opacity: 0.6; }
        .search-input:focus {
            outline: none;
            background: rgba(255,255,255,0.35);
            border-color: rgba(255,255,255,0.6);
        }
        .search-stats {
            margin-top: 8px;
            font-size: 0.85rem;
            opacity: 0.6;
            text-align: center;
            height: 20px;
        }

        /* ── Grid ── */
        .biz-grid {
            padding: 28px 40px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 24px;
        }

        /* ── Card ── */
        .biz-card {
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(16px);
            border: 1.5px solid rgba(255,255,255,0.28);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
        }
        .biz-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 24px 50px rgba(0,0,0,0.18);
        }

        .card-accent { height: 5px; }

        .card-photo {
            width: 100%; height: 175px; object-fit: cover; display: block;
        }
        .card-placeholder {
            width: 100%; height: 110px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; background: rgba(255,255,255,0.07);
        }

        .card-body { padding: 18px 20px 14px; }

        .card-badge {
            display: inline-block; padding: 4px 12px; border-radius: 50px;
            font-size: 0.75rem; font-weight: 800; margin-bottom: 9px;
            background: rgba(255,255,255,0.2); letter-spacing: 0.02em;
        }
        .card-name { font-size: 1.2rem; font-weight: 800; margin-bottom: 7px; line-height: 1.2; }
        .card-desc { font-size: 0.88rem; opacity: 0.75; line-height: 1.6; margin-bottom: 12px; }
        .card-meta { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
        .meta-row { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; opacity: 0.8; }

        .card-actions { display: flex; gap: 8px; }

        .btn-call {
            flex: 1; padding: 10px 14px;
            background: rgba(255,255,255,0.85); color: #111;
            border: none; border-radius: 10px; font-size: 0.87rem; font-weight: 800;
            cursor: pointer; text-decoration: none; text-align: center;
            transition: all 0.22s; display: flex; align-items: center; justify-content: center; gap: 6px;
            font-family: inherit;
        }
        .btn-call:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.15); }

        .btn-map {
            padding: 10px 13px;
            background: rgba(255,255,255,0.15);
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 10px; font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.22s;
        }
        .btn-map:hover { background: rgba(255,255,255,0.28); transform: translateY(-2px); }

        /* ── Map modal ── */
        .map-modal {
            display: none;
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(6px);
            align-items: center; justify-content: center;
            padding: 20px;
        }
        .map-modal.open { display: flex; }
        .map-box {
            width: 100%; max-width: 700px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(0,0,0,0.35);
            animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes popIn {
            from { transform: scale(0.88); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }
        .map-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px;
        }
        .map-title { font-size: 1rem; font-weight: 800; }
        .map-close {
            background: rgba(255,255,255,0.2); border: none;
            border-radius: 50%; width: 32px; height: 32px;
            font-size: 1.1rem; cursor: pointer; color: inherit;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .map-close:hover { background: rgba(255,255,255,0.4); }
        .map-iframe {
            width: 100%; height: 380px; border: none; display: block;
        }
        .map-open-link {
            display: block; text-align: center;
            padding: 12px; font-size: 0.85rem; font-weight: 700;
            opacity: 0.65; text-decoration: none; transition: opacity 0.2s;
        }
        .map-open-link:hover { opacity: 1; }

        .no-data {
            grid-column: 1/-1; text-align: center;
            padding: 60px 20px; opacity: 0.6; font-size: 1.05rem; font-weight: 700;
        }

        @media (max-width: 768px) {
            .cat-bar, .search-section { padding-left: 20px; padding-right: 20px; }
            .biz-grid { grid-template-columns: 1fr; padding: 20px; }
            .map-iframe { height: 280px; }
        }
    </style>
</head>
<body>

    <!-- i luv parallax<3 -->
    <div class="parallax-bg">
        <div class="parallax-layer layer-1" data-speed="0.2">
            <div class="ball"></div><div class="ball"></div>
            <div class="ball"></div><div class="ball"></div>
        </div>
        <div class="parallax-layer layer-2" data-speed="0.5">
            <div class="ball"></div><div class="ball"></div><div class="ball"></div>
        </div>
        <div class="parallax-layer layer-3" data-speed="1">
            <div class="ball"></div><div class="ball"></div><div class="ball"></div>
        </div>
    </div>

    <div class="container">
        <header class="page-header">
            <a href="index.html" class="back-link">← Буцах</a>
            <h1>Бизнес лавлах</h1>
        </header>

        <div class="search-section">
            <input type="text" id="searchInput" class="search-input"
                placeholder="🔍 Нэр, утас, хаягаар хайх..." autocomplete="off">
            <div id="searchStats" class="search-stats"></div>
        </div>

        <div class="cat-bar">
            <button class="cat-btn active" data-cat="all">🏙️ Бүгд</button>
            <button class="cat-btn" data-cat="restaurant">🍽️ Ресторан</button>
            <button class="cat-btn" data-cat="bakery">🍞 Нарийн боов</button>
            <button class="cat-btn" data-cat="gym">💪 Фитнесс</button>
            <button class="cat-btn" data-cat="carwash">🚿 Авто угаалга</button>
            <button class="cat-btn" data-cat="carfix">🔧 Авто засвар</button>
            <button class="cat-btn" data-cat="salon">💈 Гоо сайхан</button>
            <button class="cat-btn" data-cat="shop">🏪 Дэлгүүр</button>
            <button class="cat-btn" data-cat="other">📦 Бусад</button>
        </div>

        <main id="bizGrid" class="biz-grid"></main>

        <footer><p>Мөрөн Хүргэлт • 2025</p></footer>
    </div>

    <!-- Map modal -->
    <div class="map-modal" id="mapModal">
        <div class="map-box">
            <div class="map-header">
                <span class="map-title" id="mapTitle"></span>
                <button class="map-close" onclick="closeMap()">✕</button>
            </div>
            <iframe class="map-iframe" id="mapIframe" src="" loading="lazy"
                allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
            <a class="map-open-link" id="mapOpenLink" target="_blank" rel="noopener">
                🗺️ Google Maps-д нээх ↗
            </a>
        </div>
    </div>

    <script>
        // parallax scroll
        window.addEventListener('scroll', function() {
            var layers = document.querySelectorAll('.parallax-layer')
            var scrolled = window.pageYOffset
            for (var i = 0; i < layers.length; i++) {
                var spd = layers[i].dataset.speed
                layers[i].style.transform = 'translateY(' + (-scrolled * spd) + 'px)'
            }
        })
    </script>

    <script>
/* ==========================================================
   ╔══════════════════════════════════════════════════════╗
   ║           БИЗНЕС ЖАГСААЛТ — ЗАСВАРЛАХ ХЭСЭГ         ║
   ╚══════════════════════════════════════════════════════╝

   НЭМЭХ: Доорх BUSINESSES массивт {} блок нэмнэ
   УСТГАХ: Тухайн {} блокийг бүтнээр устгана

   ТАЛБАРУУД:
     name:        "нэр"                        ← ЗААВАЛ
     category:    "restaurant"                 ← ЗААВАЛ (доор жагсаасан)
     color:       "#ff6b6b"                    ← картын зурвасын өнгө
     description: "тайлбар"                   ← заавал биш
     phone:       "99001122"                   ← заавал биш
     address:     "хаяг"                       ← заавал биш
     mapUrl:      "https://maps.google.com/…"  ← заавал биш (дотор дэлгэнэ)
     photoUrl:    "https://…/photo.jpg"        ← заавал биш

   АНГИЛАЛ утгууд:
     "restaurant" "bakery" "gym" "carwash"
     "carfix"     "salon"  "shop" "other"

   ӨНГӨ:  #ff6b6b #43e97b #4facfe #fee140
          #fa709a #667eea #f093fb #1a1a2e
   ══════════════════════════════════════════════════════ */

const BUSINESSES = [

  /* ── РЕСТОРАН ── */
  {
    name:        "Эрдэнэ Зул Ресторан",
    category:    "restaurant",
    color:       "#ff6b6b",
    description: "Монгол болон европ хоол. Захиалгаар хүргэлт хийнэ.",

    address:     "Мөрөн хот, Төв зам 5",
    mapUrl:      "https://maps.google.com",
    photoUrl:    "",
  },
  {
    name:        "Тал Нутгийн Кафе",
    category:    "restaurant",
    color:       "#f093fb",
    description: "Өглөөний цай, кофе, хөнгөн зууш. 08:00–22:00.",
    phone:       "88223344",
    address:     "2-р хороо, Нийгмийн төв",
    mapUrl:      "",
    photoUrl:    "",
  },

  /* ── НАРИЙН БООВ ── */
  {
    name:        "Алтан Талх",
    category:    "bakery",
    color:       "#fee140",
    description: "Өдөр бүр шинэхэн талх, нарийн боов.",
    phone:       "99112233",
    address:     "1-р хороо, Захын гудамж 12",
    mapUrl:      "",
    photoUrl:    "",
  },

  /* ── ФИТНЕСС ── */
  {
    name:        "Мөрөн Фитнесс",
    category:    "gym",
    color:       "#43e97b",
    description: "Дасгалын заал, персонал тренер. 06:00–22:00.",
    phone:       "99445566",
    address:     "3-р хороо, Спортын зам",
    mapUrl:      "",
    photoUrl:    "",
  },

  /* ── АВТО УГААЛГА ── */
  {
    name:        "Хурдан Авто Угаалга",
    category:    "carwash",
    color:       "#4facfe",
    description: "Гар болон машинаар угаалга. Дотор цэвэрлэгээ.",
    phone:       "88556677",
    address:     "4-р хороо, Замын хажуу",
    mapUrl:      "",
    photoUrl:    "",
  },

  /* ── АВТО ЗАСВАР ── */
  {
    name:        "Эрдэнэ Авто Засвар",
    category:    "carfix",
    color:       "#c0864a",
    description: "Бүх төрлийн машины засвар, ТО үйлчилгээ.",
    phone:       "99778899",
    address:     "5-р хороо, Аж үйлдвэрийн бүс",

  },

  /* ── ГОО САЙХАН ── */
  {
    name:        "Гоёл Салон",

  },

  /* ── ДЭЛГҮҮР ── */
  {
    name:        "Мөнх Дэлгүүр",
    category:    "shop",

    description: "Хүнсний болон ахуйн бараа. 08:00–23:00 нээлттэй.",

  },

  /* ── БУСАД ── */
  {
    name:        "Хурдан Хүргэлт",
    category:    "other",
    color:       "#1a1a2e",
    description: "Хот доторх хурдан хүргэлт. 24/7 ажилладаг.",
    phone:       "88007799",
    address:     "Мөрөн хот",
    mapUrl:      "",

  },

  /*

  {
    name:        "",
    category:    "",
    color:       "#667eea",
    description: "",
    phone:       "",
    address:     "",
    mapUrl:      "",
    photoUrl:    "",
  },

  ──────────────────────────────────────────────────────── */

];

/* ── helpers ── */
const CAT_LABELS = {
    restaurant:'🍽️ Ресторан', bakery:'🍞 Нарийн боов',
    gym:'💪 Фитнесс',         carwash:'🚿 Авто угаалга',
    carfix:'🔧 Авто засвар',  salon:'💈 Гоо сайхан',
    shop:'🏪 Дэлгүүр',        other:'📦 Бусад',
};
const CAT_ICONS = {
    restaurant:'🍽️', bakery:'🍞', gym:'💪', carwash:'🚿',
    carfix:'🔧', salon:'💈', shop:'🏪', other:'📦'
};

function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Convert a Google Maps share/place URL → embed URL
function toEmbedUrl(url) {
    if (!url) return '';
    // Already an embed
    if (url.includes('/embed')) return url;
    // maps.app.goo.gl short links → just pass as q param
    if (url.includes('goo.gl') || url.includes('maps.app')) {
        return 'https://maps.google.com/maps?output=embed&q=' + encodeURIComponent(url);
    }
    // maps.google.com?q=… or @lat,lng
    try {
        const u = new URL(url);
        const q = u.searchParams.get('q') || u.hash;
        if (q) return 'https://maps.google.com/maps?output=embed&q=' + encodeURIComponent(q);
        // has @lat,lng,zoom
        const m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
        if (m) return `https://maps.google.com/maps?output=embed&q=${m[1]},${m[2]}`;
    } catch(e) {}
    // Fallback: wrap whole URL
    return 'https://maps.google.com/maps?output=embed&q=' + encodeURIComponent(url);
}

/* ── Map modal ── */
function openMap(name, mapUrl) {
    document.getElementById('mapTitle').textContent = '📍 ' + name;
    document.getElementById('mapIframe').src = toEmbedUrl(mapUrl);
    document.getElementById('mapOpenLink').href = mapUrl;
    document.getElementById('mapModal').classList.add('open');
    document.body.style.overflow = 'hidden';
}
window.closeMap = function() {
    document.getElementById('mapModal').classList.remove('open');
    document.getElementById('mapIframe').src = '';
    document.body.style.overflow = '';
};
document.getElementById('mapModal').addEventListener('click', function(e) {
    if (e.target === this) window.closeMap();
});

/* ── Render ── */
let activeCat  = 'all';
let searchTerm = '';
const grid    = document.getElementById('bizGrid');
const statsEl = document.getElementById('searchStats');

function renderGrid() {
    const filtered = BUSINESSES.filter(b => {
        const matchCat  = activeCat === 'all' || b.category === activeCat;
        const matchText = !searchTerm ||
            (b.name||'').toLowerCase().includes(searchTerm) ||
            (b.description||'').toLowerCase().includes(searchTerm) ||
            (b.phone||'').includes(searchTerm) ||
            (b.address||'').toLowerCase().includes(searchTerm);
        return matchCat && matchText;
    });

    statsEl.textContent = (searchTerm || activeCat !== 'all')
        ? `${filtered.length} бизнес олдлоо (нийт ${BUSINESSES.length})`
        : `Нийт ${BUSINESSES.length} бизнес`;

    if (!filtered.length) {
        grid.innerHTML = '<div class="no-data">🔍 Хайлтад тохирох бизнес олдсонгүй</div>';
        return;
    }

    grid.innerHTML = '';
    filtered.forEach((b, i) => {
        const color = b.color || '#667eea';
        const card  = document.createElement('div');
        card.className = 'biz-card';
        card.innerHTML = `
            <div class="card-accent" style="background:${esc(color)};"></div>
            ${b.photoUrl
                ? `<img class="card-photo" src="${esc(b.photoUrl)}" alt="${esc(b.name)}" loading="lazy" onerror="this.style.display='none'">`
                : `<div class="card-placeholder">${CAT_ICONS[b.category]||'📦'}</div>`
            }
            <div class="card-body">
                <div class="card-badge">${CAT_LABELS[b.category]||'📦 Бусад'}</div>
                <div class="card-name">${esc(b.name)}</div>
                ${b.description ? `<div class="card-desc">${esc(b.description)}</div>` : ''}
                <div class="card-meta">
                    ${b.phone   ? `<div class="meta-row">📞 ${esc(b.phone)}</div>` : ''}
                    ${b.address ? `<div class="meta-row">📍 ${esc(b.address)}</div>` : ''}
                </div>
                <div class="card-actions">
                    ${b.phone
                        ? `<a href="tel:${esc(b.phone)}" class="btn-call">📞 Залгах</a>`
                        : '<div style="flex:1"></div>'
                    }
                    ${b.mapUrl
                        ? `<button class="btn-map" onclick="openMap(${JSON.stringify(b.name)}, ${JSON.stringify(b.mapUrl)})">🗺️</button>`
                        : ''
                    }
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
}

document.getElementById('searchInput').addEventListener('input', function(e) {
    searchTerm = e.target.value.toLowerCase().trim();
    renderGrid();
});

document.querySelectorAll('.cat-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        activeCat = btn.dataset.cat;
        renderGrid();
    });
});

renderGrid();
    </script>
