<script type="module">

import { initializeApp }  from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getDatabase, ref, onValue, push, remove, update }
from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

/* ✅ ONLY ADDITION: AUTH */
import {
    getAuth,
    signInAnonymously,
    onAuthStateChanged
} from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

const app = initializeApp({
    apiKey: "AIzaSyArvfvF1FWfqNAJnzfNiyEq0Lm2qioPIas",
    authDomain: "huwsgul-hurgelt.firebaseapp.com",
    databaseURL: "https://huwsgul-hurgelt-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "huwsgul-hurgelt",
    storageBucket: "huwsgul-hurgelt.firebasestorage.app",
    messagingSenderId: "457877716370",
    appId: "1:457877716370:web:5bc6e08801e36010c3d54b"
});

const db = getDatabase(app);

/* ✅ AUTH ADDED */
const auth = getAuth(app);
signInAnonymously(auth).catch(console.error);

let isAuthed = false;

onAuthStateChanged(auth, (user) => {
    isAuthed = !!user;
    if (!user) {
        document.body.classList.remove('admin-mode');
        adminFab.classList.remove('visible');
        adminUnlocked = false;
    }
});

/* =========================
   YOUR ORIGINAL SHA (UNCHANGED)
========================= */
async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
}

const MASTER_HASH = "bb8a0bbd05fcd35216c2d673de54c4e657fd791e50c6f9acd6c15255dd3d767a";

/* =========================
   VARIABLES (UNCHANGED)
========================= */
let allBiz = {};
let activeCat = 'all';
let searchTerm = '';
let editingId = null;
let adminUnlocked = false;

const grid = document.getElementById('bizGrid');
const searchInp = document.getElementById('searchInput');
const adminFab = document.getElementById('adminFab');

/* =========================
   FIREBASE LISTENER
========================= */
onValue(ref(db, 'businesses'), snap => {
    allBiz = snap.exists() ? snap.val() : {};
    renderGrid();
});

/* =========================
   RENDER (UNCHANGED LOGIC)
========================= */
function renderGrid() {
    grid.innerHTML = '';

    Object.keys(allBiz).forEach(id => {
        const b = allBiz[id];

        const card = document.createElement('div');
        card.innerHTML = `
            <div>${b.name}</div>
        `;
        grid.appendChild(card);
    });
}

/* =========================
   ADMIN UNLOCK (MODIFIED ONLY)
========================= */
document.getElementById('pageTitle').addEventListener('click', async () => {
    const pin = prompt("PIN:");
    if (!pin) return;

    const hash = await sha256(pin);

    if (!isAuthed) {
        alert("Auth шаардлагатай");
        return;
    }

    if (hash === MASTER_HASH) {
        adminUnlocked = true;
        document.body.classList.add('admin-mode');
        adminFab.classList.add('visible');
        alert("Admin ON");
    } else {
        alert("Wrong PIN");
    }
});

/* =========================
   EXIT ADMIN
========================= */
window.exitAdmin = () => {
    adminUnlocked = false;
    document.body.classList.remove('admin-mode');
    adminFab.classList.remove('visible');
};

</script>
