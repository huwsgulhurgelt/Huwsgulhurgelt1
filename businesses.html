<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, update }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

/* SHA256 */
async function sha256(message){
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
}

const MASTER_HASH = "bb8a0bbd05fcd35216c2d673de54c4e657fd791e50c6f9acd6c15255dd3d767a";

/* Firebase */
const app = initializeApp({
    apiKey: "AIzaSyArvfvF1FWfqNAJnzfNiyEq0Lm2qioPIas",
    authDomain: "huwsgul-hurgelt.firebaseapp.com",
    databaseURL: "https://huwsgul-hurgelt-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "huwsgul-hurgelt",
    storageBucket: "huwsgul-hurgelt.firebasestorage.app",
    messagingSenderId: "457877716370",
    appId: "1:457877716370:web:5bc6e08801e36010c3d54b"
});

const db = getDatabase(app);

/* state */
let allBiz = {};
let activeCat = "all";
let searchTerm = "";
let editingId = null;
let selectedColor = "#667eea";

/* elements */
const grid = document.getElementById("bizGrid");
const statsEl = document.getElementById("searchStats");
const searchInp = document.getElementById("searchInput");
const bizModal = document.getElementById("bizModal");
const bizForm = document.getElementById("bizForm");
const adminFab = document.getElementById("adminFab");
const photoInput = document.getElementById("fPhoto");
const photoPreview = document.getElementById("photoPreview");

/* live db */
onValue(ref(db,"businesses"), snap=>{
    allBiz = snap.exists() ? snap.val() : {};
    renderGrid();
});

/* render */
function renderGrid(){
    const keys = Object.keys(allBiz).filter(id=>{
        const b = allBiz[id];
        const matchCat = activeCat==="all" || b.category===activeCat;
        const matchTerm =
            !searchTerm ||
            (b.name||"").toLowerCase().includes(searchTerm) ||
            (b.description||"").toLowerCase().includes(searchTerm) ||
            (b.phone||"").includes(searchTerm) ||
            (b.address||"").toLowerCase().includes(searchTerm);

        return matchCat && matchTerm;
    });

    statsEl.textContent = `Нийт: ${keys.length}`;

    if(!keys.length){
        grid.innerHTML = `<div class="no-data">Олдсонгүй</div>`;
        return;
    }

    grid.innerHTML = "";

    keys.forEach(id=>{
        const b = allBiz[id];

        const card = document.createElement("div");
        card.className = "biz-card";
        card.innerHTML = `
        <div class="biz-body">
            <div class="biz-name">${b.name}</div>
            <div class="biz-desc">${b.description||""}</div>

            <div class="biz-actions">
                <a class="biz-btn-call" href="tel:${b.phone||""}">📞 Залгах</a>
                ${b.mapUrl ? `<a class="biz-btn-map" href="${b.mapUrl}" target="_blank">🗺️</a>` : ""}
            </div>
        </div>

        <div class="admin-card-actions">
            <button class="btn-small btn-edit" onclick="window.editBiz('${id}')">Edit</button>
            <button class="btn-small btn-delete" onclick="window.deleteBiz('${id}')">Delete</button>
        </div>
        `;
        grid.appendChild(card);
    });
}

/* search */
searchInp.addEventListener("input", e=>{
    searchTerm = e.target.value.toLowerCase();
    renderGrid();
});

/* admin */
window.editBiz = async (id)=>{
    const pin = prompt("PIN:");
    if(!pin) return;
    if(await sha256(pin)!==MASTER_HASH) return alert("Wrong PIN");
    alert("Open edit modal here");
};

window.deleteBiz = async (id)=>{
    const pin = prompt("PIN:");
    if(!pin) return;
    if(await sha256(pin)!==MASTER_HASH) return alert("Wrong PIN");

    if(confirm("Delete?")){
        await remove(ref(db,"businesses/"+id));
    }
};

</script>
</body>
</html>
