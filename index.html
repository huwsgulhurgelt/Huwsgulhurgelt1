<body>
    <!-- i luv parallax<3 -->
    <div class="parallax-bg">
        <div class="parallax-layer layer-1" data-speed="0.2">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
        </div>
        <div class="parallax-layer layer-2" data-speed="0.5">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
        </div>
        <div class="parallax-layer layer-3" data-speed="1">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
        </div>
    </div>

    <div class="container">
        <header class="hero">
            <h1>Мөрөн Хүргэлт</h1>

    <script>
        // parallax scroll 
        window.addEventListener('scroll', function() {
            var layers = document.querySelectorAll('.parallax-layer')
            var scrolled = window.pageYOffset
            for (var i = 0; i < layers.length; i++) {
                var spd = layers[i].dataset.speed
                layers[i].style.transform = 'translateY(' + (-scrolled * spd) + 'px)'
            }
        })
    </script>
    <script>
document.addEventListener('DOMContentLoaded', () => {

  const balls = [...document.querySelectorAll('.ball')];

  balls.forEach(b => {
    const match = window.getComputedStyle(b).backgroundColor
      .match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
    b._r = match ? +match[1] : 100;
    b._g = match ? +match[2] : 100;
    b._b = match ? +match[3] : 200;
  });

  let lx = window.innerWidth  / 2;
  let ly = window.innerHeight / 2;
  let scrollY = 0;

  window.addEventListener('scroll', () => { scrollY = window.scrollY; });
  window.addEventListener('resize', () => {
    lx = window.innerWidth  / 2;
    ly = window.innerHeight / 2;
  });

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function tick() {
    const lightX = lx;
    const lightY = ly - scrollY * 0.25;

    balls.forEach(b => {
      const rect = b.getBoundingClientRect();
      const bx   = rect.left + rect.width  / 2;
      const by   = rect.top  + rect.height / 2;
      const rad  = rect.width / 2;

      const dx   = lightX - bx;
      const dy   = lightY - by;
      const dist = Math.hypot(dx, dy) || 1;
      const nx   = dx / dist;
      const ny   = dy / dist;

      const hlX = (50 + nx * 38).toFixed(1);
      const hlY = (50 + ny * 38).toFixed(1);

      const r  = b._r;
      const g  = b._g;
      const bl = b._b;

      const hi = v => Math.min(255, Math.round(v + 90));
      const md = v => Math.round(v);
      const lo = v => Math.max(0,   Math.round(v - 75));

      b.style.background =
        `radial-gradient(circle at ${hlX}% ${hlY}%,` +
        `rgb(${hi(r)},${hi(g)},${hi(bl)}) 0%,` +
        `rgb(${md(r)},${md(g)},${md(bl)}) 45%,` +
        `rgb(${lo(r)},${lo(g)},${lo(bl)}) 100%)`;

      const proximity  = clamp(dist / 600, 0, 1);
      const shadowLen  = rad * (0.5 + proximity * 1.2);
      const shadowBlur = rad * (1.0 + proximity * 1.5);
      const shadowOp   = (0.15 + proximity * 0.45).toFixed(2);
      const sx = (-nx * shadowLen).toFixed(1);
      const sy = (-ny * shadowLen).toFixed(1);

      b.style.boxShadow =
        `${sx}px ${sy}px ${shadowBlur.toFixed(1)}px rgba(0,0,0,${shadowOp})`;
    });

    requestAnimationFrame(tick);
  }

  tick();
});
</script>
</body>
