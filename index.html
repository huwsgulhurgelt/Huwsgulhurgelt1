    <script>
        // parallax scroll 
        window.addEventListener('scroll', function() {
            var layers = document.querySelectorAll('.parallax-layer')
            var scrolled = window.pageYOffset
            for (var i = 0; i < layers.length; i++) {
                var spd = layers[i].dataset.speed
                layers[i].style.transform = 'translateY(' + (-scrolled * spd) + 'px)'
            }

    </script>
 <script>
document.addEventListener('DOMContentLoaded', () => {

  const balls  = [...document.querySelectorAll('.ball')];
  const pBg    = document.querySelector('.parallax-bg');

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;';
  pBg.insertBefore(svg, pBg.firstChild);

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  svg.appendChild(defs);

  const shadows = balls.map((b, i) => {
    const grad = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
    grad.id = 'sg' + i;
    grad.setAttribute('gradientUnits', 'userSpaceOnUse');

    const s1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
    s1.setAttribute('offset', '0%');

    const s2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
    s2.setAttribute('offset', '100%');
    s2.setAttribute('stop-color', 'rgba(0,0,0,0)');

    grad.appendChild(s1);
    grad.appendChild(s2);
    defs.appendChild(grad);

    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('fill', 'url(#sg' + i + ')');
    svg.appendChild(poly);

    return { poly, grad, s1 };
  });

  let lx = window.innerWidth  / 2;
  let ly = window.innerHeight / 2;
  let scrollY = 0;
  let frame = 0;

  window.addEventListener('scroll', () => { scrollY = window.scrollY; });
  window.addEventListener('resize', () => {
    lx = window.innerWidth  / 2;
    ly = window.innerHeight / 2;
  });

  const SHADOW_LEN = 500;
  const SPREAD     = 2.8;

  function tick() {
    requestAnimationFrame(tick);

    // throttle: only update every 2nd frame
    if (++frame % 2 !== 0) return;

    const lightY = ly - scrollY * 0.2;

    // --- batch READ all rects first (no interleaved writes) ---
    const rects = balls.map(b => b.getBoundingClientRect());

    // --- then batch WRITE ---
    rects.forEach((rect, i) => {
      const bx = rect.left + rect.width  / 2;
      const by = rect.top  + rect.height / 2;
      const r  = rect.width / 2;

      const dx   = bx - lx;
      const dy   = by - lightY;
      const dist = Math.hypot(dx, dy) || 1;
      const nx   = dx / dist;
      const ny   = dy / dist;
      const px   = -ny;
      const py   =  nx;

      const ax  = bx + px * r,         ay  = by + py * r;
      const bpx = bx - px * r,         bpy = by - py * r;
      const farW = r * SPREAD;
      const cx  = ax  + nx * SHADOW_LEN + px * farW;
      const cy  = ay  + ny * SHADOW_LEN + py * farW;
      const dpx = bpx + nx * SHADOW_LEN - px * farW;
      const dpy = bpy + ny * SHADOW_LEN - py * farW;

      const { poly, grad, s1 } = shadows[i];

      poly.setAttribute('points',
        `${ax.toFixed(1)},${ay.toFixed(1)} ` +
        `${bpx.toFixed(1)},${bpy.toFixed(1)} ` +
        `${dpx.toFixed(1)},${dpy.toFixed(1)} ` +
        `${cx.toFixed(1)},${cy.toFixed(1)}`
      );

      grad.setAttribute('x1', bx.toFixed(1));
      grad.setAttribute('y1', by.toFixed(1));
      grad.setAttribute('x2', (bx + nx * SHADOW_LEN).toFixed(1));
      grad.setAttribute('y2', (by + ny * SHADOW_LEN).toFixed(1));

      // max opacity 0.18 — subtle but clear
      const op = Math.min(0.18, 0.05 + dist / 2000);
      s1.setAttribute('stop-color', `rgba(0,0,0,${op.toFixed(3)})`);
    });
  }

  tick();
});
</script>
