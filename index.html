<body>
    <!-- i luv parallax<3 -->
    <div class="parallax-bg">
        <div class="parallax-layer layer-1" data-speed="0.2">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
        </div>
        <div class="parallax-layer layer-2" data-speed="0.5">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
        </div>
        <div class="parallax-layer layer-3" data-speed="1">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
        </div>
    </div>

    <div class="container">

    <script>
        // parallax scroll 
        window.addEventListener('scroll', function() {
            var layers = document.querySelectorAll('.parallax-layer')
            var scrolled = window.pageYOffset
            for (var i = 0; i < layers.length; i++) {
                var spd = layers[i].dataset.speed
                layers[i].style.transform = 'translateY(' + (-scrolled * spd) + 'px)'
            }
        })
    </script>
  <script>
document.addEventListener('DOMContentLoaded', () => {

  const balls = [...document.querySelectorAll('.ball')];
  let lx = window.innerWidth  / 2;
  let ly = window.innerHeight / 2;
  let scrollY = 0;

  window.addEventListener('scroll', () => { scrollY = window.scrollY; });
  window.addEventListener('resize', () => {
    lx = window.innerWidth  / 2;
    ly = window.innerHeight / 2;
  });

  function tick() {
    const lightY = ly - scrollY * 0.2;

    balls.forEach(b => {
      const rect = b.getBoundingClientRect();
      const bx   = rect.left + rect.width  / 2;
      const by   = rect.top  + rect.height / 2;
      const rad  = rect.width / 2;

      const dx   = bx - lx;
      const dy   = by - lightY;
      const dist = Math.hypot(dx, dy) || 1;

      const sx = ((dx / dist) * rad * 1.5).toFixed(1);
      const sy = ((dy / dist) * rad * 1.5).toFixed(1);
      const blur = (rad * 2).toFixed(1);
      const op = Math.min(0.55, 0.1 + dist / 800).toFixed(2);

      b.style.boxShadow = `${sx}px ${sy}px ${blur}px rgba(0,0,0,${op})`;
    });

    requestAnimationFrame(tick);
  }

  tick();
});
</script>
