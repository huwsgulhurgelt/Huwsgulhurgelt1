<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мөрөн Хүргэлт</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- i luv parallax<3 -->
    <div class="parallax-bg">
        <div class="parallax-layer layer-1" data-speed="0.2">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
        </div>
        <div class="parallax-layer layer-2" data-speed="0.5">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
        </div>
        <div class="parallax-layer layer-3" data-speed="1">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
        </div>
    </div>

    <div class="container">
        <header class="hero">
            <h1>Мөрөн Хүргэлт</h1>
            <p class="subtitle">Энэ бол зөвхөн зуучлах сайт юм ЭДЦС ыг 11г ангийн сурагчид билгүүн ашинаран нар хийсэн болно</p>
        </header>
        <main class="menu">
            <a href="carriers.html" class="btn btn-user">
                <span class="btn-icon">👤</span>
                Хэрэглэгч
            </a>
            <a href="signup.html" class="btn btn-carrier">
                <span class="btn-icon">🚚</span>
                Хүргэгч
            </a>
        </main>
        <footer>
            <p></p>
        </footer>
    </div>

    <script>
        // parallax scroll turshilt
        window.addEventListener('scroll', function() {
            var layers = document.querySelectorAll('.parallax-layer')
            var scrolled = window.pageYOffset
            for (var i = 0; i < layers.length; i++) {
                var spd = layers[i].dataset.speed
                layers[i].style.transform = 'translateY(' + (-scrolled * spd) + 'px)'
            }
        })
    </script>
</body>
</html>
