<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мөрөн Хүргэлт</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home">

    <div class="worm-bg">
        <svg id="wormSvg" viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <nav class="top-nav">
        <div class="dot-grid">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
        </div>
        <div class="nav-right">Menu &nbsp;—</div>
    </nav>

    <main class="home-main">

        <section class="home-hero">
            <span class="section-tag">01 — Зуучлах платформ</span>
            <h1 class="home-title">Мөрөн<br>Хүргэлт</h1>
            <p class="home-sub">Хурдан, энгийн, найдвартай</p>
        </section>

        <section class="home-links">
            <a href="carriers.html" class="home-link">
                <span class="link-num">01</span>
                <span class="link-label">Хэрэглэгч — хүргэлт хайх</span>
                <span class="link-arrow">↗</span>
            </a>
            <a href="signup.html" class="home-link">
                <span class="link-num">02</span>
                <span class="link-label">Хүргэгч болох — бүртгүүлэх</span>
                <span class="link-arrow">↗</span>
            </a>
        </section>

        <section class="home-info">
            <div class="info-block">
                <span class="info-label">Тухай</span>
                <p>Мөрөн дэх хүргэлтийн зуучлах цэг. Хэрэглэгч хүргэлт хайж, хүргэгч бүртгүүлнэ.</p>
            </div>
        </section>

        <footer class="home-footer">
            <p>Сургуулийн төсөл • Prototype</p>
        </footer>

    </main>

    <style>
        @keyframes wormWave {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(0.44); }
        }
    </style>

    <script>
        var svg     = document.getElementById('wormSvg')
        var N       = 10
        var dur     = 4.8   // slower now
        var stagger = dur / N

        for (var i = 0; i < N; i++) {
            var dist = Math.abs(i - (N-1) / 2)
            var r    = 28 + dist * 15
            var cy   = 24 + i * 42
            var c    = document.createElementNS('http://www.w3.org/2000/svg', 'circle')
            c.setAttribute('cx', 150)
            c.setAttribute('cy', cy)
            c.setAttribute('r', r)
            c.setAttribute('fill', 'none')
            c.setAttribute('stroke', 'white')
            c.setAttribute('stroke-width', '0.85')
            c.style.cssText = 'animation: wormWave ' + dur + 's ease-in-out ' + (i * stagger) + 's infinite; transform-box: fill-box; transform-origin: center center;'
            svg.appendChild(c)
        }
    </script>
</body>
</html>
