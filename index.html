<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мөрөн Хүргэлт</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Parallax Background i luv parallax<3 -->
    <div class="parallax-bg">
        
        <div class="parallax-layer layer-1" data-speed="0.2">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
        </div>
        <div class="parallax-layer layer-2" data-speed="0.5">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
        </div>
        <div class="parallax-layer layer-3" data-speed="1">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
        </div>
    </div>

    <div class="container">
        <header class="hero">
            <h1>Мөрөн Хүргэлт</h1>
            
            <p class="subtitle">Энэ бол зөвхөн зуучлах сайт</p>
        </header>

        <main class="menu">
            <a href="carriers.html" class="btn btn-user">
                <span class="btn-icon">👤</span>
                Хэрэглэгч
            </a>
            <a href="signup.html" class="btn btn-carrier">
                <span class="btn-icon">🚚</span>
                Хүргэгч
            </a>
            
        </main>

        <footer>
            <p></p>
        </footer>
    </div>

    <script>
        // parallax scroll turshilt
        // 0.2 0.5 1 hurd boljeesn 0.8->discusting
        window.addEventListener('scroll', () => {
            const layers = document.querySelectorAll('.parallax-layer')
            const scrolled = window.pageYOffset
            layers.forEach(layer => {
                const speed = layer.dataset.speed
                layer.style.transform = `translateY(${-scrolled * speed}px)`
            })
        })

        
    </script>

</body>
</html>
