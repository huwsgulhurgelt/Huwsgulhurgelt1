<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Боломжит хүргэгчид - Мөрөн Хүргэлт</title>
    <link rel="stylesheet" href="style.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        .carrier-plate {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fee140;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        /* ─── Floating map button ─── */
        .map-fab {
            position: fixed;
            bottom: 36px;
            right: 36px;
            z-index: 999;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.55);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                        box-shadow 0.3s ease;
            color: white;
        }

        .map-fab:hover {
            transform: scale(1.12) translateY(-3px);
            box-shadow: 0 14px 40px rgba(102, 126, 234, 0.75);
        }

        .map-fab:active {
            transform: scale(0.96);
        }

        /* Pulse ring */
        .map-fab::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid rgba(102, 126, 234, 0.5);
            animation: fab-pulse 2.5s ease-out infinite;
        }

        @keyframes fab-pulse {
            0%   { transform: scale(1);   opacity: 0.8; }
            70%  { transform: scale(1.35); opacity: 0;   }
            100% { transform: scale(1.35); opacity: 0;   }
        }

        /* ─── Map overlay ─── */
        .map-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1500;
            background: rgba(5, 8, 22, 0.82);
            backdrop-filter: blur(8px);
            animation: overlayIn 0.3s ease;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .map-overlay.active {
            display: flex;
        }

        @keyframes overlayIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .map-panel {
            width: 100%;
            max-width: 860px;
            height: min(600px, 85vh);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            animation: panelIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(14, 18, 42, 0.98);
        }

        @keyframes panelIn {
            from { transform: translateY(40px) scale(0.96); opacity: 0; }
            to   { transform: translateY(0)    scale(1);    opacity: 1; }
        }

        /* Panel header */
        .map-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            flex-shrink: 0;
        }

        .map-panel-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .map-panel-title span {
            font-size: 1.3rem;
        }

        .map-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
            line-height: 1;
        }

        .map-close:hover {
            background: rgba(255,255,255,0.35);
            transform: rotate(90deg);
        }

        /* The actual map */
        #moron-map {
            flex: 1;
            width: 100%;
        }

        /* Override Leaflet to match dark theme */
        .leaflet-container {
            background: #0d1128 !important;
            font-family: 'Inter', sans-serif;
        }

        .leaflet-control-zoom a {
            background: rgba(14, 18, 42, 0.95) !important;
            color: #e8eaf6 !important;
            border-color: rgba(255,255,255,0.15) !important;
        }

        .leaflet-control-zoom a:hover {
            background: rgba(102, 126, 234, 0.4) !important;
        }

        .leaflet-control-attribution {
            background: rgba(14, 18, 42, 0.8) !important;
            color: #6b7299 !important;
            font-size: 0.7rem !important;
        }

        .leaflet-control-attribution a {
            color: #667eea !important;
        }

        /* Map hint bar */
        .map-hint {
            padding: 10px 20px;
            background: rgba(10, 14, 35, 0.95);
            color: #8892b0;
            font-size: 0.82rem;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }

        .map-hint strong {
            color: #667eea;
        }

        /* ─── Location button inside map panel header ─── */
        .map-locate-btn {
            background: rgba(255,255,255,0.22);
            border: 1px solid rgba(255,255,255,0.35);
            color: white;
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s, transform 0.2s;
            white-space: nowrap;
        }
        .map-locate-btn:hover {
            background: rgba(255,255,255,0.35);
            transform: translateY(-1px);
        }
        .map-locate-btn.locating {
            animation: locateSpin 1s linear infinite;
        }
        @keyframes locateSpin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* ─── Location off banner ─── */
        .location-banner {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 11px 20px;
            background: linear-gradient(90deg, rgba(254,193,64,0.18) 0%, rgba(102,126,234,0.12) 100%);
            border-bottom: 1px solid rgba(254,193,64,0.25);
            font-size: 0.82rem;
            color: #e8d88a;
            flex-shrink: 0;
        }
        .location-banner.visible {
            display: flex;
        }
        .location-banner span {
            flex: 1;
            line-height: 1.4;
        }
        .location-banner-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .banner-dismiss {
            background: none;
            border: none;
            color: #e8d88a;
            cursor: pointer;
            font-size: 1rem;
            padding: 0 4px;
            opacity: 0.7;
            flex-shrink: 0;
        }
        .banner-dismiss:hover { opacity: 1; }

        /* ─── User location marker dot ─── */
        .user-dot {
            width: 16px; height: 16px;
            background: #43e97b;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 0 5px rgba(67,233,123,0.3), 0 3px 12px rgba(67,233,123,0.5);
        }

        /* Mobile */
        @media (max-width: 600px) {
            .map-fab {
                bottom: 24px;
                right: 20px;
                width: 56px;
                height: 56px;
                font-size: 1.4rem;
            }

            .map-panel {
                height: min(500px, 88vh);
                border-radius: 18px;
            }

            .map-panel-header {
                padding: 14px 18px;
            }
        }
    </style>
</head>
<body>

    <!-- Parallax Background -->
    <div class="parallax-bg">
        <div class="parallax-layer layer-1" data-speed="0.2">
            <div class="ball"></div><div class="ball"></div>
            <div class="ball"></div><div class="ball"></div>
        </div>
        <div class="parallax-layer layer-2" data-speed="0.5">
            <div class="ball"></div><div class="ball"></div><div class="ball"></div>
        </div>
        <div class="parallax-layer layer-3" data-speed="1">
            <div class="ball"></div><div class="ball"></div><div class="ball"></div>
        </div>
    </div>

    <div class="container">
        <header class="page-header">
            <a href="index.html" class="back-link">← Буцах</a>
            <h1>Боломжит хүргэгчид</h1>
        </header>

        <div class="search-section">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input"
                    placeholder="🔍 Утас, тайлбар, эсвэл өдрөөр хайх..." autocomplete="off">
                <div id="searchSuggestions" class="search-suggestions"></div>
            </div>
            <div id="searchStats" class="search-stats"></div>
        </div>

        <main id="carriersContainer" class="carriers-grid">
            <div class="loading">Уншиж байна...</div>
        </main>

        <footer>
            <p>Сургуулийн төсөл • Prototype</p>
        </footer>
    </div>

    <!-- ─── Floating Map Button ─── -->
    <button class="map-fab" id="mapFab" title="Мөрөн хотын газрын зураг">
        📍
    </button>

    <!-- ─── Map Overlay ─── -->
    <div class="map-overlay" id="mapOverlay">
        <div class="map-panel">
            <div class="map-panel-header">
                <div class="map-panel-title">
                    <span>🗺️</span> Мөрөн хот — Газрын зураг
                </div>
                <div style="display:flex;align-items:center;gap:10px;">
                    <button class="map-locate-btn" id="locateBtn" title="Миний байршил">
                        📡 Байршил
                    </button>
                    <button class="map-close" id="mapClose" title="Хаах">✕</button>
                </div>
            </div>

            <!-- Shows when location is denied/unavailable -->
            <div class="location-banner" id="locationBanner">
                <span class="location-banner-icon">💡</span>
                <span>Байршил асаасан тохиолдолд Мөрөн хот дотор таны бодит байршлыг харуулна</span>
                <button class="banner-dismiss" id="bannerDismiss" title="Хаах">✕</button>
            </div>

            <div id="moron-map"></div>

            <div class="map-hint">
                Хулгана эсвэл хуруугаараа <strong>гүйлгэж</strong> / <strong>томруулж</strong> үзэх боломжтой
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModel" class="model" style="display: none;">
        <div class="model-content">
            <div class="model-header">
                <h2>Мэдээлэл засах</h2>
                <span class="close-model" onclick="closeEditModel()">&times;</span>
            </div>
            <form id="editForm">
                <div class="form-group">
                    <label for="editPhone">Утасны дугаар</label>
                    <input type="tel" id="editPhone" required>
                </div>
                <div class="form-group">
                    <label>Машины дугаар</label>
                    <div class="car-number-container">
                        <input type="text" id="editCarNumber" class="car-number-input" placeholder="1234" maxlength="4">
                        <input type="text" id="editCarLetters" class="car-letters-input" placeholder="ХӨВ" maxlength="3">
                    </div>
                </div>
                <div class="form-group">
                    <label for="editDescription">Юу хүргэж чадах вэ?</label>
                    <textarea id="editDescription" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label for="editWeight">Хамгийн ихдээ хэдэн кг зөөж чадах вэ?</label>
                    <div class="weight-slider-container">
                        <input type="range" id="editWeight" min="1" max="100" value="10" class="weight-slider">
                        <div class="weight-display">
                            <span id="editWeightValue">10</span> кг
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Хүргэлт хийх боломжтой өдрүүд</label>
                    <div class="days-selector">
                        <label class="day-checkbox"><input type="checkbox" name="editDays" value="Даваа"><span>Даваа</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="editDays" value="Мягмар"><span>Мягмар</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="editDays" value="Лхагва"><span>Лхагва</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="editDays" value="Пүрэв"><span>Пүрэв</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="editDays" value="Баасан"><span>Баасан</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="editDays" value="Бямба"><span>Бямба</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="editDays" value="Ням"><span>Ням</span></label>
                    </div>
                </div>
                <div class="model-actions">
                    <button type="button" class="btn-cancel" onclick="closeEditModel()">Болих</button>
                    <button type="submit" class="btn-submit">Хадгалах</button>
                </div>
            </form>
        </div>
    </div>

  <!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ─── Parallax ───
    window.addEventListener('scroll', () => {
        const layers = document.querySelectorAll('.parallax-layer');
        const scrolled = window.pageYOffset;
        layers.forEach(layer => {
            layer.style.transform = `translateY(${-scrolled * layer.dataset.speed}px)`;
        });
    });

    // ─── Map setup ───
    let mapInitialized = false;
    let moronMap = null;
    let userMarker = null;

    const MORON = { lat: 49.6356, lng: 100.1614 };

    function initMap() {
        if (mapInitialized) return;
        mapInitialized = true;

        moronMap = L.map('moron-map', {
            center: [MORON.lat, MORON.lng],
            zoom: 14,
            zoomControl: true,
            scrollWheelZoom: true,
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19,
        }).addTo(moronMap);

        const pulseIcon = L.divIcon({
            className: '',
            html: `
                <div style="
                    width: 18px; height: 18px;
                    background: #667eea;
                    border-radius: 50%;
                    border: 3px solid white;
                    box-shadow: 0 0 0 6px rgba(102,126,234,0.25), 0 4px 15px rgba(102,126,234,0.5);
                    animation: markerPulse 2s ease-out infinite;
                "></div>
                <style>
                    @keyframes markerPulse {
                        0%   { box-shadow: 0 0 0 0   rgba(102,126,234,0.5), 0 4px 15px rgba(102,126,234,0.4); }
                        70%  { box-shadow: 0 0 0 12px rgba(102,126,234,0), 0 4px 15px rgba(102,126,234,0.2); }
                        100% { box-shadow: 0 0 0 0   rgba(102,126,234,0), 0 4px 15px rgba(102,126,234,0.2); }
                    }
                </style>
            `,
            iconSize: [18, 18],
            iconAnchor: [9, 9],
        });

        L.marker([MORON.lat, MORON.lng], { icon: pulseIcon })
            .addTo(moronMap)
            .bindPopup(`
                <div style="font-family:'Inter',sans-serif; text-align:center; padding:4px 2px; color:#1a1a2e;">
                    <div style="font-size:1.4rem; margin-bottom:4px;">🏙️</div>
                    <strong style="font-size:1rem; color:#1a1a2e;">Мөрөн хот</strong><br>
                    <span style="font-size:0.8rem; color:#555;">Хөвсгөл аймгийн төв</span>
                </div>
            `)
            .openPopup();

        showLocationBanner();
    }

    function showLocationBanner() {
        document.getElementById('locationBanner').classList.add('visible');
    }
    function hideLocationBanner() {
        document.getElementById('locationBanner').classList.remove('visible');
    }

    document.getElementById('bannerDismiss').addEventListener('click', hideLocationBanner);
    document.getElementById('locateBtn').addEventListener('click', locateUser);

    function locateUser() {
        if (!navigator.geolocation) {
            alert('Таны төхөөрөмж байршил тогтоохыг дэмждэггүй.');
            return;
        }
        const btn = document.getElementById('locateBtn');
        btn.innerHTML = '⏳ Хайж байна...';
        btn.disabled = true;

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const { latitude: lat, longitude: lng } = pos.coords;
                if (userMarker) moronMap.removeLayer(userMarker);
                const userIcon = L.divIcon({
                    className: '',
                    html: `<div class="user-dot"></div>`,
                    iconSize: [16, 16],
                    iconAnchor: [8, 8],
                });
                userMarker = L.marker([lat, lng], { icon: userIcon })
                    .addTo(moronMap)
                    .bindPopup(`
                        <div style="font-family:'Inter',sans-serif; text-align:center; padding:4px; color:#1a1a2e;">
                            <div style="font-size:1.2rem; margin-bottom:4px;">🟢</div>
                            <strong>Таны байршил</strong><br>
                            <span style="font-size:0.75rem; color:#555;">${lat.toFixed(5)}, ${lng.toFixed(5)}</span>
                        </div>
                    `)
                    .openPopup();
                moronMap.setView([lat, lng], 15, { animate: true });
                hideLocationBanner();
                btn.innerHTML = '📡 Байршил';
                btn.disabled = false;
            },
            (err) => {
                btn.innerHTML = '📡 Байршил';
                btn.disabled = false;
                showLocationBanner();
                if (err.code !== err.PERMISSION_DENIED) {
                    alert('Байршил тогтоох боломжгүй байна. Дахин оролдоно уу.');
                }
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    const mapFab     = document.getElementById('mapFab');
    const mapOverlay = document.getElementById('mapOverlay');
    const mapClose   = document.getElementById('mapClose');

    mapFab.addEventListener('click', () => {
        mapOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        setTimeout(initMap, 60);
    });

    function closeMap() {
        mapOverlay.classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    mapClose.addEventListener('click', closeMap);
    mapOverlay.addEventListener('click', (e) => { if (e.target === mapOverlay) closeMap(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeMap(); });
</script>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getDatabase, ref, onValue, remove, update } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

    // ─── SHA-256 (moved into module so it's in the same scope) ───
    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const MASTER_PIN_HASH = "cb1ddeb68a770c93b6a91023d1e4aab32e0d5c2037fbac639f425fdac2162522";

    const firebaseConfig = {
        apiKey: "AIzaSyArvfvF1FWfqNAJnzfNiyEq0Lm2qioPIas",
        authDomain: "huwsgul-hurgelt.firebaseapp.com",
        databaseURL: "https://huwsgul-hurgelt-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "huwsgul-hurgelt",
        storageBucket: "huwsgul-hurgelt.firebasestorage.app",
        messagingSenderId: "457877716370",
        appId: "1:457877716370:web:5bc6e08801e36010c3d54b"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    const carriersContainer = document.getElementById('carriersContainer');
    const searchInput       = document.getElementById('searchInput');
    const searchStats       = document.getElementById('searchStats');
    const editModel         = document.getElementById('editModel');
    const editForm          = document.getElementById('editForm');
    const editWeightSlider  = document.getElementById('editWeight');
    const editWeightValue   = document.getElementById('editWeightValue');

    let allCarriers = {};
    let filteredCarriers = {};
    let currentEditId = null;

    editWeightSlider.addEventListener('input', (e) => {
        editWeightValue.textContent = e.target.value;
    });

    document.getElementById('editCarLetters').addEventListener('input', (e) => {
        e.target.value = e.target.value.toUpperCase().replace(/[^А-ЯӨҮ]/g, '').slice(0, 3);
    });

    document.getElementById('editCarNumber').addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4);
    });

    onValue(ref(database, 'carriers'), (snapshot) => {
        if (!snapshot.exists()) {
            carriersContainer.innerHTML = '<div class="no-data">Одоогоор хүргэгч байхгүй байна.</div>';
            allCarriers = {};
            filteredCarriers = {};
            updateSearchStats();
            return;
        }
        allCarriers = snapshot.val();
        filteredCarriers = { ...allCarriers };
        displayCarriers(filteredCarriers);
        updateSearchStats();
    });

    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase().trim();
        if (!term) {
            filteredCarriers = { ...allCarriers };
            displayCarriers(filteredCarriers);
            updateSearchStats();
            return;
        }
        filteredCarriers = {};
        Object.keys(allCarriers).forEach(key => {
            const c = allCarriers[key];
            if (
                c.phone.toLowerCase().includes(term) ||
                c.description.toLowerCase().includes(term) ||
                (c.days && c.days.join(' ').toLowerCase().includes(term))
            ) {
                filteredCarriers[key] = c;
            }
        });
        displayCarriers(filteredCarriers);
        updateSearchStats();
    });

    function displayCarriers(carriers) {
        carriersContainer.innerHTML = '';
        if (!Object.keys(carriers).length) {
            carriersContainer.innerHTML = '<div class="no-data">Хайлтад тохирох хүргэгч олдсонгүй</div>';
            return;
        }
        Object.keys(carriers).forEach(id => {
            const c = carriers[id];
            const card = document.createElement('div');
            card.className = 'carrier-card';
            card.innerHTML = `
                <div class="card-content">
                    <div class="carrier-phone">${c.phone}</div>
                    ${c.carPlate ? `<div class="carrier-plate">🚗 ${c.carPlate}</div>` : ''}
                    <div class="carrier-description">${c.description}</div>
                    <div class="carrier-meta">
                        <span class="carrier-days">📅 ${c.days ? c.days.join(', ') : 'Өдөр сонгоогүй'}</span>
                        ${c.maxWeight ? `<span class="carrier-weight">⚖️ ${c.maxWeight} кг</span>` : ''}
                    </div>
                </div>
                <div class="card-actions">
                    <button class="btn-small btn-edit"   onclick="window.editCarrier('${id}')">Засах</button>
                    <button class="btn-small btn-delete" onclick="window.deleteCarrier('${id}')">Устгах</button>
                </div>
            `;
            carriersContainer.appendChild(card);
        });
    }

    function updateSearchStats() {
        const total   = Object.keys(allCarriers).length;
        const showing = Object.keys(filteredCarriers).length;
        searchStats.innerHTML = searchInput.value.trim()
            ? `${showing} хүргэгч олдлоо (Нийт: ${total})`
            : `Нийт ${total} хүргэгч`;
    }

    window.editCarrier = async function(id) {
        const pin = prompt('PIN код оруулна уу:');
        if (!pin) return;
        const enteredHash    = await sha256(pin);
        const carrierPin     = allCarriers[id]?.pin;
        const carrierPinHash = carrierPin ? await sha256(carrierPin) : null;
        if (enteredHash === MASTER_PIN_HASH || (carrierPinHash && enteredHash === carrierPinHash)) {
            openEditModel(id);
        } else {
            alert('Буруу PIN код!');
        }
    };

    window.deleteCarrier = async function(id) {
        const pin = prompt('Устгахын тулд PIN код оруулна уу:');
        if (!pin) return;
        const enteredHash    = await sha256(pin);
        const carrierPin     = allCarriers[id]?.pin;
        const carrierPinHash = carrierPin ? await sha256(carrierPin) : null;
        if (enteredHash !== MASTER_PIN_HASH && enteredHash !== carrierPinHash) {
            alert('Буруу PIN код!');
            return;
        }
        if (!confirm('Та устгахдаа итгэлтэй байна уу?')) return;
        remove(ref(database, `carriers/${id}`))
            .then(() => alert('Амжилттай устгалаа!'))
            .catch(err => { console.error(err); alert('Алдаа гарлаа!'); });
    };

    function openEditModel(id) {
        currentEditId = id;
        const c = allCarriers[id];
        document.getElementById('editPhone').value       = c.phone;
        document.getElementById('editDescription').value = c.description;
        editWeightSlider.value      = c.maxWeight || 10;
        editWeightValue.textContent = c.maxWeight || 10;
        if (c.carPlate) {
            document.getElementById('editCarNumber').value  = c.carPlate.match(/^\d+/)?.[0]             || '';
            document.getElementById('editCarLetters').value = c.carPlate.match(/[А-ЯӨҮa-zA-Z]+$/)?.[0] || '';
        }
        document.querySelectorAll('input[name="editDays"]').forEach(cb => {
            cb.checked = c.days && c.days.includes(cb.value);
        });
        editModel.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    window.closeEditModel = function() {
        editModel.style.display = 'none';
        document.body.style.overflow = 'auto';
        currentEditId = null;
        editForm.reset();
    };

    window.addEventListener('click', (e) => {
        if (e.target === editModel) window.closeEditModel();
    });

    editForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const phone      = document.getElementById('editPhone').value.trim();
        const desc       = document.getElementById('editDescription').value.trim();
        const weight     = parseInt(editWeightSlider.value);
        const days       = Array.from(document.querySelectorAll('input[name="editDays"]:checked')).map(cb => cb.value);
        const carNumber  = document.getElementById('editCarNumber').value.trim();
        const carLetters = document.getElementById('editCarLetters').value.trim();
        if (!days.length) { alert('Наад зах нь нэг өдөр сонгоно уу!'); return; }
        try {
            await update(ref(database, `carriers/${currentEditId}`), {
                phone, description: desc, maxWeight: weight, days,
                carPlate: carNumber + carLetters
            });
            alert('Амжилттай шинэчлэгдлээ!');
            window.closeEditModel();
        } catch (err) {
            console.error(err);
            alert('Алдаа гарлаа!');
        }
    });
</script>
</body>
</html>
