<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хүргэгчид - Мөрөн</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="parallax-bg">
        <div class="parallax-layer layer-1" data-speed="0.2">
            <div class="ball"></div><div class="ball"></div>
            <div class="ball"></div><div class="ball"></div>
        </div>
        <div class="parallax-layer layer-2" data-speed="0.5">
            <div class="ball"></div><div class="ball"></div><div class="ball"></div>
        </div>
        <div class="parallax-layer layer-3" data-speed="1">
            <div class="ball"></div><div class="ball"></div><div class="ball"></div>
        </div>
    </div>

    <div class="worm-bg">
        <svg id="wormSvg" viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="container">
        <header class="page-header">
            <a href="index.html" class="back-link">← Буцах</a>
            <h1>Боломжит хүргэгчид</h1>
        </header>

        <div class="search-section">
            <div class="search-container">
                <input type="text" id="srchInput" class="search-input"
                    placeholder="🔍 Утас, тайлбар хайх..." autocomplete="off">
            </div>
            <div id="srchStats" class="search-stats"></div>
        </div>

        <main id="listContainer" class="carriers-grid">
            <div class="loading">Уншиж байна...</div>
        </main>

        <footer>
            <p>Сургуулийн төсөл • Prototype</p>
        </footer>
    </div>

    <!-- modal -- class is "model" from old css, too lazy to fix -->
    <div id="editModal" class="model" style="display:none;">
        <div class="model-content">
            <div class="model-header">
                <h2>Мэдээлэл засах</h2>
                <span class="close-model" onclick="closeModal()">&times;</span>
            </div>
            <form id="editForm">
                <div class="form-group">
                    <label for="ePhone">Утасны дугаар</label>
                    <input type="tel" id="ePhone" required>
                </div>
                <div class="form-group">
                    <label>Машины дугаар</label>
                    <div class="car-number-container">
                        <input type="text" id="eCarNum" class="car-number-input" placeholder="1234" maxlength="4">
                        <input type="text" id="eCarLet" class="car-letters-input" placeholder="ХӨВ" maxlength="3">
                    </div>
                </div>
                <div class="form-group">
                    <label for="eDesc">Юу хүргэж чадах вэ?</label>
                    <textarea id="eDesc" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label for="eWeight">Хамгийн ихдээ хэдэн кг?</label>
                    <div class="weight-slider-container">
                        <input type="range" id="eWeight" min="1" max="100" value="10" class="weight-slider">
                        <div class="weight-display">
                            <span id="eWeightVal">10</span> кг
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Өдрүүд</label>
                    <div class="days-selector">
                        <label class="day-checkbox"><input type="checkbox" name="eDays" value="Даваа"><span>Даваа</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="eDays" value="Мягмар"><span>Мягмар</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="eDays" value="Лхагва"><span>Лхагва</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="eDays" value="Пүрэв"><span>Пүрэв</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="eDays" value="Баасан"><span>Баасан</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="eDays" value="Бямба"><span>Бямба</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="eDays" value="Ням"><span>Ням</span></label>
                    </div>
                </div>
                <div class="model-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Болих</button>
                    <button type="submit" class="btn-submit">Хадгалах</button>
                </div>
            </form>
        </div>
    </div>

    <style>
        @keyframes wormWave {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(0.44); }
        }
    </style>

    <script>
        // parallax scroll
        window.addEventListener('scroll', function() {
            var layers = document.querySelectorAll('.parallax-layer')
            var scrolled = window.pageYOffset
            for (var i = 0; i < layers.length; i++) {
                layers[i].style.transform = 'translateY(' + (-scrolled * layers[i].dataset.speed) + 'px)'
            }
        })

        // worm copy paste from index
        var svg2 = document.getElementById('wormSvg')
        for (var wi = 0; wi < 10; wi++) {
            var wd = Math.abs(wi - 4.5)
            var wc = document.createElementNS('http://www.w3.org/2000/svg', 'circle')
            wc.setAttribute('cx', 150)
            wc.setAttribute('cy', 24 + wi * 42)
            wc.setAttribute('r',  28 + wd * 15)
            wc.setAttribute('fill', 'none')
            wc.setAttribute('stroke', 'white')
            wc.setAttribute('stroke-width', '0.85')
            wc.style.cssText = 'animation: wormWave 4.8s ease-in-out ' + (wi * 0.48) + 's infinite; transform-box: fill-box; transform-origin: center center;'
            svg2.appendChild(wc)
        }

        // hash fn -- stackoverflow dont touch
        async function hashPin(p) {
            const buf = new TextEncoder().encode(p)
            const h = await crypto.subtle.digest('SHA-256', buf)
            return [...new Uint8Array(h)].map(x => x.toString(16).padStart(2, '0')).join('')
        }

        // master pin "4133"
        var MASTER_HASH = 'a07cf27590e57bf851029cada1b752019189ba52defb3e43401887fcb2489b5e'
    </script>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js'
        import { getDatabase, ref, onValue, remove, update } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js'

        const cfg = {
            apiKey: "AIzaSyArvfvF1FWfqNAJnzfNiyEq0Lm2qioPIas",
            authDomain: "huwsgul-hurgelt.firebaseapp.com",
            databaseURL: "https://huwsgul-hurgelt-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "huwsgul-hurgelt",
            storageBucket: "huwsgul-hurgelt.firebasestorage.app",
            messagingSenderId: "457877716370",
            appId: "1:457877716370:web:5bc6e08801e36010c3d54b"
        }

        const app = initializeApp(cfg)
        const db  = getDatabase(app)

        var allData = {}, filtered = {}, editingId = null

        var listEl  = document.getElementById('listContainer')
        var srchEl  = document.getElementById('srchInput')
        var statsEl = document.getElementById('srchStats')
        var modal   = document.getElementById('editModal')
        var form    = document.getElementById('editForm')
        var wSlider = document.getElementById('eWeight')
        var wVal    = document.getElementById('eWeightVal')

        wSlider.oninput = function() { wVal.textContent = this.value }

        document.getElementById('eCarLet').addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase().slice(0, 3)
        })
        document.getElementById('eCarNum').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4)
        })

        onValue(ref(db, 'carriers'), function(snap) {
            if (!snap.exists()) {
                listEl.innerHTML = '<div class="no-data">Хүргэгч байхгүй байна.</div>'
                allData = {}; filtered = {}
                updateStats(); return
            }
            allData = snap.val()
            filtered = Object.assign({}, allData)
            renderList(filtered)
            updateStats()
        })

        srchEl.addEventListener('input', function() {
            var q = this.value.toLowerCase().trim()
            if (!q) { filtered = Object.assign({}, allData); renderList(filtered); updateStats(); return }
            filtered = {}
            Object.keys(allData).forEach(function(k) {
                var c = allData[k]
                var hay = c.phone + ' ' + c.description + ' ' + (c.days ? c.days.join(' ') : '')
                if (hay.toLowerCase().includes(q)) filtered[k] = c
            })
            renderList(filtered)
            updateStats()
        })

        function renderList(data) {
            listEl.innerHTML = ''
            var keys = Object.keys(data)
            if (!keys.length) { listEl.innerHTML = '<div class="no-data">Олдсонгүй</div>'; return }
            keys.forEach(function(id) {
                var c    = data[id]
                var card = document.createElement('div')
                card.className = 'carrier-card'
                var platePart  = c.carPlate ? '<div class="plate-txt">🚗 ' + c.carPlate + '</div>' : ''
                var daysStr    = c.days ? c.days.join(', ') : 'Өдөр сонгоогүй'
                var weightPart = c.maxWeight ? '<span class="carrier-weight">⚖️ ' + c.maxWeight + ' кг</span>' : ''
                card.innerHTML =
                    '<div class="card-content">' +
                        '<div class="carrier-phone">' + c.phone + '</div>' +
                        platePart +
                        '<div class="carrier-description">' + c.description + '</div>' +
                        '<div class="carrier-meta"><span class="carrier-days">📅 ' + daysStr + '</span>' + weightPart + '</div>' +
                    '</div>' +
                    '<div class="card-actions">' +
                        '<button class="btn-small btn-edit" onclick="editCarrier(\'' + id + '\')">Засах</button>' +
                        '<button class="btn-small btn-delete" onclick="deleteCarrier(\'' + id + '\')">Устгах</button>' +
                    '</div>'
                listEl.appendChild(card)
            })
        }

        function updateStats() {
            var total = Object.keys(allData).length, showing = Object.keys(filtered).length
            statsEl.textContent = srchEl.value.trim()
                ? showing + ' хүргэгч олдлоо (Нийт: ' + total + ')'
                : 'Нийт ' + total + ' хүргэгч'
        }

        window.editCarrier = async function(id) {
            var pin = prompt('PIN код:')
            if (!pin) return
            var entered = await hashPin(pin)
            var ch = allData[id] && allData[id].pin ? await hashPin(allData[id].pin) : null
            if (entered !== MASTER_HASH && entered !== ch) { alert('Буруу PIN!'); return }
            openModal(id)
        }

        window.deleteCarrier = async function(id) {
            var pin = prompt('Устгах PIN:')
            if (!pin) return
            var entered = await hashPin(pin)
            var ch = allData[id] && allData[id].pin ? await hashPin(allData[id].pin) : null
            if (entered !== MASTER_HASH && entered !== ch) { alert('Буруу PIN!'); return }
            if (!confirm('Устгах уу?')) return
            remove(ref(db, 'carriers/' + id))
                .then(function() { alert('Устгалаа!') })
                .catch(function(err) { alert('Алдаа: ' + err.message) })
        }

        function openModal(id) {
            editingId = id
            var c = allData[id]
            document.getElementById('ePhone').value = c.phone
            document.getElementById('eDesc').value  = c.description
            wSlider.value = c.maxWeight || 10
            wVal.textContent = c.maxWeight || 10
            if (c.carPlate) {
                var m = c.carPlate.match(/^(\d+)([А-ЯӨҮa-zA-Z]+)$/)
                document.getElementById('eCarNum').value = m ? m[1] : ''
                document.getElementById('eCarLet').value = m ? m[2] : ''
            } else {
                document.getElementById('eCarNum').value = ''
                document.getElementById('eCarLet').value = ''
            }
            document.querySelectorAll('input[name="eDays"]').forEach(function(cb) {
                cb.checked = c.days && c.days.includes(cb.value)
            })
            modal.style.display = 'block'
            document.body.style.overflow = 'hidden'
        }

        window.closeModal = function() {
            modal.style.display = 'none'
            document.body.style.overflow = ''
            editingId = null
            form.reset()
        }

        window.onclick = function(e) { if (e.target === modal) closeModal() }

        form.addEventListener('submit', function(e) {
            e.preventDefault()
            var phone = document.getElementById('ePhone').value.trim()
            var desc  = document.getElementById('eDesc').value.trim()
            var kg    = parseInt(wSlider.value)
            var days  = []
            document.querySelectorAll('input[name="eDays"]:checked').forEach(function(cb) { days.push(cb.value) })
            var num  = document.getElementById('eCarNum').value.trim()
            var lets = document.getElementById('eCarLet').value.trim()
            if (!days.length) { alert('Наад зах нь нэг өдөр сонгоно уу!'); return }
            update(ref(db, 'carriers/' + editingId), {
                phone: phone, description: desc, maxWeight: kg, days: days, carPlate: num + lets
            })
            .then(function() { alert('Хадгаллаа!'); closeModal() })
            .catch(function(err) { alert('Алдаа: ' + err.message) })
        })
    </script>
</body>
</html>
