<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Боломжит хүргэгчид - Мөрөн Хүргэлт</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .carrier-plate { font-size:1.1rem; font-weight:700; color:#f0a500; margin-bottom:10px; font-family:'Courier New',monospace; letter-spacing:2px; }
        .map-fab { position:fixed; bottom:36px; right:36px; z-index:999; width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,0.75); backdrop-filter:blur(12px); border:2px solid rgba(255,255,255,0.6); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1.6rem; box-shadow:0 8px 30px rgba(0,0,0,0.14); transition:transform .3s cubic-bezier(.175,.885,.32,1.275),box-shadow .3s; }
        .map-fab:hover { transform:scale(1.12) translateY(-3px); box-shadow:0 16px 40px rgba(0,0,0,0.2); background:rgba(255,255,255,0.95); }
        .map-fab::after { content:''; position:absolute; inset:-4px; border-radius:50%; border:2px solid rgba(0,0,0,0.1); animation:fab-pulse 2.5s ease-out infinite; }
        @keyframes fab-pulse { 0%{transform:scale(1);opacity:.8} 70%{transform:scale(1.35);opacity:0} 100%{transform:scale(1.35);opacity:0} }
        .map-overlay { display:none; position:fixed; inset:0; z-index:1500; background:rgba(0,0,0,0.3); backdrop-filter:blur(10px); align-items:center; justify-content:center; padding:20px; }
        .map-overlay.active { display:flex; }
        .map-panel { width:100%; max-width:860px; height:min(600px,85vh); border-radius:24px; overflow:hidden; border:2px solid rgba(255,255,255,0.55); box-shadow:0 30px 80px rgba(0,0,0,0.18); display:flex; flex-direction:column; animation:panelIn .35s cubic-bezier(.175,.885,.32,1.275); background:rgba(255,255,255,0.88); backdrop-filter:blur(24px); }
        @keyframes panelIn { from{transform:translateY(40px) scale(0.95);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }
        .map-panel-header { display:flex; align-items:center; justify-content:space-between; padding:16px 22px; background:rgba(255,255,255,0.6); border-bottom:1.5px solid rgba(0,0,0,0.07); backdrop-filter:blur(8px); flex-shrink:0; }
        .map-panel-title { display:flex; align-items:center; gap:9px; color:#1a1a2e; font-size:1.1rem; font-weight:800; }
        .map-close { background:rgba(0,0,0,0.07); border:1.5px solid rgba(0,0,0,0.1); color:#333; width:34px; height:34px; border-radius:50%; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s,transform .2s; }
        .map-close:hover { background:rgba(0,0,0,0.14); transform:rotate(90deg); }
        .map-locate-btn { background:rgba(0,0,0,0.07); border:1.5px solid rgba(0,0,0,0.12); color:#333; padding:7px 14px; border-radius:20px; font-size:.82rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px; transition:background .2s,transform .2s; white-space:nowrap; }
        .map-locate-btn:hover { background:rgba(0,0,0,0.13); transform:translateY(-1px); }
        .location-banner { display:none; align-items:center; gap:10px; padding:10px 20px; background:rgba(255,240,200,0.6); border-bottom:1.5px solid rgba(220,180,60,0.25); font-size:.82rem; color:#7a5c00; flex-shrink:0; }
        .location-banner.visible { display:flex; }
        .location-banner span { flex:1; line-height:1.4; }
        .banner-dismiss { background:none; border:none; color:#7a5c00; cursor:pointer; font-size:1rem; padding:0 4px; opacity:.6; }
        #moron-map { flex:1; width:100%; }
        .map-hint { padding:9px 20px; background:rgba(255,255,255,0.55); color:#888; font-size:.8rem; text-align:center; border-top:1.5px solid rgba(0,0,0,0.06); flex-shrink:0; }
        .map-hint strong { color:#444; }
        .user-dot { width:16px; height:16px; background:#43b97b; border-radius:50%; border:3px solid white; box-shadow:0 0 0 5px rgba(67,185,123,0.25); }
        .leaflet-container { background:#e8e4db !important; }
        .leaflet-control-zoom a { background:rgba(255,255,255,0.92) !important; color:#333 !important; border-color:rgba(0,0,0,0.12) !important; font-weight:700 !important; }
        .leaflet-control-zoom a:hover { background:#fff !important; }
        .leaflet-control-attribution { background:rgba(255,255,255,0.7) !important; color:#888 !important; font-size:.7rem !important; }
        .leaflet-popup-content-wrapper { border-radius:14px !important; box-shadow:0 8px 30px rgba(0,0,0,0.14) !important; border:1.5px solid rgba(0,0,0,0.07) !important; }
        .leaflet-popup-tip { background:white !important; }

        .own-badge { display:inline-block; font-size:0.72rem; font-weight:800; background:rgba(67,185,123,0.2); color:#2a8a55; border:1px solid rgba(67,185,123,0.35); border-radius:20px; padding:2px 9px; margin-left:8px; vertical-align:middle; }

        /* Report button */
        .btn-report {
            background: rgba(255,80,80,0.08);
            border: 1.5px solid rgba(255,80,80,0.2);
            color: rgba(255,80,80,0.7);
            padding: 5px 10px; border-radius: 8px;
            font-size: 0.75rem; font-weight: 700;
            cursor: pointer; font-family: inherit;
            transition: all 0.2s; flex-shrink: 0;
        }
        .btn-report:hover:not(:disabled) { background: rgba(255,80,80,0.18); border-color: rgba(255,80,80,0.4); color: #ff5050; }
        .btn-report:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-report.reported { background: rgba(255,150,0,0.1); border-color: rgba(255,150,0,0.3); color: rgba(200,120,0,0.8); }

        /* Card actions row */
        .card-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

        @media (max-width:600px) { .map-fab { bottom:24px; right:20px; width:56px; height:56px; font-size:1.4rem; } .map-panel { height:min(500px,88vh); border-radius:18px; } }
    </style>
</head>
<body>
    <div class="parallax-bg">
        <div class="parallax-layer layer-1" data-speed="0.2"><div class="ball"></div><div class="ball"></div><div class="ball"></div><div class="ball"></div></div>
        <div class="parallax-layer layer-2" data-speed="0.5"><div class="ball"></div><div class="ball"></div><div class="ball"></div></div>
        <div class="parallax-layer layer-3" data-speed="1"><div class="ball"></div><div class="ball"></div><div class="ball"></div></div>
    </div>

    <div class="container">
        <header class="page-header">
            <a href="index.html" class="back-link">← Буцах</a>
            <h1>Боломжит хүргэгчид</h1>
        </header>
        <div class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Утас, тайлбар, эсвэл өдрөөр хайх..." autocomplete="off">
            <div id="searchStats" class="search-stats"></div>
        </div>
        <main id="carriersContainer" class="carriers-grid">
            <div class="loading">Уншиж байна...</div>
        </main>
        <footer><p>Мөрөн Хүргэлт • 2025</p></footer>
    </div>

    <button class="map-fab" id="mapFab">📍</button>

    <div class="map-overlay" id="mapOverlay">
        <div class="map-panel">
            <div class="map-panel-header">
                <div class="map-panel-title"><span>🗺️</span> Мөрөн хот — Газрын зураг</div>
                <div style="display:flex;align-items:center;gap:10px;">
                    <button class="map-locate-btn" id="locateBtn">📡 Байршил</button>
                    <button class="map-close" id="mapClose">✕</button>
                </div>
            </div>
            <div class="location-banner" id="locationBanner">
                <span>💡 Байршил асаасан тохиолдолд таны бодит байршлыг харуулна</span>
                <button class="banner-dismiss" id="bannerDismiss">✕</button>
            </div>
            <div id="moron-map"></div>
            <div class="map-hint">Хулгана эсвэл хуруугаараа <strong>гүйлгэж</strong> / <strong>томруулж</strong> үзэх боломжтой</div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="model" style="display:none;">
        <div class="model-content">
            <div class="model-header">
                <h2>Мэдээлэл засах</h2>
                <span class="close-model" onclick="closeEditModal()">&times;</span>
            </div>
            <form id="editForm">
                <div class="form-group"><label>Утасны дугаар</label><input type="tel" id="editPhone" maxlength="8" required></div>
                <div class="form-group">
                    <label>Машины дугаар</label>
                    <div class="car-number-container">
                        <input type="text" id="editCarNumber"  class="car-number-input"  placeholder="1234" maxlength="4">
                        <input type="text" id="editCarLetters" class="car-letters-input" placeholder="ХӨВ" maxlength="3">
                    </div>
                </div>
                <div class="form-group"><label>Юу хүргэж чадах вэ?</label><textarea id="editDescription" rows="4" maxlength="500" required></textarea></div>
                <div class="form-group">
                    <label>Хэдэн кг хүртэл? (<span id="editWeightValue">10</span> кг)</label>
                    <input type="range" id="editWeight" min="1" max="100" value="10" step="1" class="weight-slider">
                </div>
                <div class="form-group">
                    <label>Хүргэлт хийх боломжтой өдрүүд</label>
                    <div class="days-selector">
                        <label class="day-checkbox"><input type="checkbox" name="editDays" value="Даваа"><span>Даваа</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="editDays" value="Мягмар"><span>Мягмар</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="editDays" value="Лхагва"><span>Лхагва</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="editDays" value="Пүрэв"><span>Пүрэв</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="editDays" value="Баасан"><span>Баасан</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="editDays" value="Бямба"><span>Бямба</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="editDays" value="Ням"><span>Ням</span></label>
                    </div>
                </div>
                <div class="model-actions">
                    <button type="button" class="btn-cancel" onclick="closeEditModal()">Болих</button>
                    <button type="submit" class="btn-submit">Хадгалах</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        window.addEventListener('scroll', function() {
            var layers = document.querySelectorAll('.parallax-layer'), s = window.pageYOffset;
            for (var i = 0; i < layers.length; i++)
                layers[i].style.transform = 'translateY(' + (-s * layers[i].dataset.speed) + 'px)';
        });
        var MORON = {lat:49.6356,lng:100.1614}, mapReady=false, moronMap=null, userMarker=null;
        function initMap() {
            if (mapReady) return; mapReady=true;
            moronMap = L.map('moron-map',{center:[MORON.lat,MORON.lng],zoom:14,scrollWheelZoom:true});
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19}).addTo(moronMap);
            var icon = L.divIcon({className:'',html:'<div style="width:18px;height:18px;background:#555;border-radius:50%;border:3px solid white;box-shadow:0 2px 12px rgba(0,0,0,0.25);"></div>',iconSize:[18,18],iconAnchor:[9,9]});
            L.marker([MORON.lat,MORON.lng],{icon:icon}).addTo(moronMap).bindPopup('<div style="text-align:center;padding:4px;"><strong>Мөрөн хот</strong></div>').openPopup();
            document.getElementById('locationBanner').classList.add('visible');
        }
        document.getElementById('bannerDismiss').addEventListener('click',function(){document.getElementById('locationBanner').classList.remove('visible');});
        document.getElementById('locateBtn').addEventListener('click',function(){
            if (!navigator.geolocation){alert('Байршил дэмжигдэхгүй.');return;}
            var btn=this; btn.textContent='⏳'; btn.disabled=true;
            navigator.geolocation.getCurrentPosition(function(pos){
                var lat=pos.coords.latitude,lng=pos.coords.longitude;
                if(userMarker) moronMap.removeLayer(userMarker);
                var ui=L.divIcon({className:'',html:'<div class="user-dot"></div>',iconSize:[16,16],iconAnchor:[8,8]});
                userMarker=L.marker([lat,lng],{icon:ui}).addTo(moronMap).bindPopup('<strong>Таны байршил</strong>').openPopup();
                moronMap.setView([lat,lng],15,{animate:true});
                document.getElementById('locationBanner').classList.remove('visible');
                btn.innerHTML='📡 Байршил'; btn.disabled=false;
            },function(){btn.innerHTML='📡 Байршил';btn.disabled=false;},{enableHighAccuracy:true,timeout:10000});
        });
        document.getElementById('mapFab').addEventListener('click',function(){document.getElementById('mapOverlay').classList.add('active');document.body.style.overflow='hidden';setTimeout(initMap,60);});
        function closeMap(){document.getElementById('mapOverlay').classList.remove('active');document.body.style.overflow='auto';}
        document.getElementById('mapClose').addEventListener('click',closeMap);
        document.getElementById('mapOverlay').addEventListener('click',function(e){if(e.target===this)closeMap();});
        document.addEventListener('keydown',function(e){if(e.key==='Escape')closeMap();});
    </script>

    <script type="module">
        import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, onValue, remove, set, get } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        const REPORT_THRESHOLD = 5; // reports needed to flag a post

        const app = initializeApp({
            apiKey: "AIzaSyArvfvF1FWfqNAJnzfNiyEq0Lm2qioPIas",
            authDomain: "huwsgul-hurgelt.firebaseapp.com",
            databaseURL: "https://huwsgul-hurgelt-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "huwsgul-hurgelt",
            storageBucket: "huwsgul-hurgelt.firebasestorage.app",
            messagingSenderId: "457877716370",
            appId: "1:457877716370:web:5bc6e08801e36010c3d54b"
        });

        const db   = getDatabase(app);
        const auth = getAuth(app);

        let currentUid = null;
        let allCarriers = {}, filteredCarriers = {};
        // Track which posts the current user has already reported: { postUid: true }
        let myReports = {};

        const container   = document.getElementById('carriersContainer');
        const searchInput = document.getElementById('searchInput');
        const searchStats = document.getElementById('searchStats');
        const editModal   = document.getElementById('editModal');
        const editForm    = document.getElementById('editForm');
        const weightSlider = document.getElementById('editWeight');
        const weightValue  = document.getElementById('editWeightValue');

        let lastSave = 0;
        const COOLDOWN_MS = 5000;

        weightSlider.addEventListener('input', e => { weightValue.textContent = e.target.value; });
        document.getElementById('editCarLetters').addEventListener('input', e => {
            e.target.value = e.target.value.toUpperCase().replace(/[^А-ЯӨҮ]/g, '').slice(0, 3);
        });
        document.getElementById('editCarNumber').addEventListener('input', e => {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4);
        });
        document.getElementById('editPhone').addEventListener('input', e => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        onAuthStateChanged(auth, async user => {
            currentUid = user ? user.uid : null;
            myReports = {};

            if (user) {
                // Load this user's existing reports so we know which posts they already reported
                const snap = await get(ref(db, 'reports'));
                if (snap.exists()) {
                    snap.forEach(postSnap => {
                        if (postSnap.child(user.uid).exists()) {
                            myReports[postSnap.key] = true;
                        }
                    });
                }
            }
            renderCarriers(filteredCarriers);
        });

        onValue(ref(db, 'carriers'), snap => {
            allCarriers = snap.exists() ? snap.val() : {};
            applyFilter();
        });

        searchInput.addEventListener('input', e => { applyFilter(e.target.value.toLowerCase().trim()); });

        function applyFilter(term) {
            term = term || searchInput.value.toLowerCase().trim();
            filteredCarriers = !term ? { ...allCarriers } : Object.fromEntries(
                Object.entries(allCarriers).filter(([, c]) =>
                    (c.phone || '').toLowerCase().includes(term) ||
                    (c.description || '').toLowerCase().includes(term) ||
                    (c.days || []).join(' ').toLowerCase().includes(term)
                )
            );
            renderCarriers(filteredCarriers);
            const total = Object.keys(allCarriers).length, shown = Object.keys(filteredCarriers).length;
            searchStats.textContent = term
                ? `${shown} хүргэгч олдлоо (Нийт: ${total})`
                : `Нийт ${total} хүргэгч`;
        }

        function escapeHtml(str) {
            return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function renderCarriers(carriers) {
            container.innerHTML = '';
            const keys = Object.keys(carriers);
            if (!keys.length) {
                container.innerHTML = '<div class="no-data">Хайлтад тохирох хүргэгч олдсонгүй</div>';
                return;
            }
            keys.forEach(uid => {
                const c   = carriers[uid];
                const own = currentUid && uid === currentUid;
                const alreadyReported = myReports[uid] === true;

                const card = document.createElement('div');
                card.className = 'carrier-card';

                // Build actions row
                let actionsHtml = '<div class="card-actions">';
                if (own) {
                    actionsHtml += `
                        <button class="btn-small btn-edit"   data-uid="${escapeHtml(uid)}">✏️ Засах</button>
                        <button class="btn-small btn-delete" data-uid="${escapeHtml(uid)}">🗑️ Устгах</button>
                    `;
                } else if (currentUid) {
                    // Logged-in users who don't own the post can report it
                    const reportLabel = alreadyReported ? '⚑ Мэдэгдсэн' : '⚑ Мэдэгдэх';
                    actionsHtml += `
                        <button class="btn-report ${alreadyReported ? 'reported' : ''}"
                                data-uid="${escapeHtml(uid)}"
                                ${alreadyReported ? 'disabled' : ''}>
                            ${reportLabel}
                        </button>
                    `;
                }
                actionsHtml += '</div>';

                card.innerHTML = `
                    <div class="card-content">
                        <div class="carrier-phone">
                            ${escapeHtml(c.phone)}
                            ${own ? '<span class="own-badge">✓ Миний пост</span>' : ''}
                        </div>
                        ${c.carPlate ? `<div class="carrier-plate">🚗 ${escapeHtml(c.carPlate)}</div>` : ''}
                        <div class="carrier-description">${escapeHtml(c.description)}</div>
                        <div class="carrier-meta">
                            <span class="carrier-days">📅 ${(c.days || []).map(escapeHtml).join(', ') || '—'}</span>
                            ${c.maxWeight ? `<span class="carrier-weight">⚖️ ${escapeHtml(String(c.maxWeight))} кг</span>` : ''}
                        </div>
                    </div>
                    ${actionsHtml}
                `;

                if (own) {
                    card.querySelector('.btn-edit').addEventListener('click',   () => openEdit(uid));
                    card.querySelector('.btn-delete').addEventListener('click', () => deletePost(uid));
                } else if (currentUid && !alreadyReported) {
                    card.querySelector('.btn-report').addEventListener('click', () => reportPost(uid, card));
                }

                container.appendChild(card);
            });
        }

        async function reportPost(postUid, card) {
            const user = auth.currentUser;
            if (!user) { alert('Мэдэгдэхийн тулд нэвтэрнэ үү!'); return; }
            if (postUid === user.uid) return; // can't report yourself

            const btn = card.querySelector('.btn-report');
            btn.disabled = true;
            btn.textContent = '⏳...';

            try {
                // Write this user's report — path enforces auth.uid === reporterUid
                await set(ref(db, `reports/${postUid}/${user.uid}`), Date.now());

                // Count total reports for this post
                const reportsSnap = await get(ref(db, `reports/${postUid}`));
                const reportCount = reportsSnap.exists() ? Object.keys(reportsSnap.val()).length : 0;

                // If threshold hit, write to flagged so admin can review
                if (reportCount >= REPORT_THRESHOLD) {
                    const postSnap = await get(ref(db, `carriers/${postUid}`));
                    if (postSnap.exists()) {
                        await set(ref(db, `flagged/${postUid}`), {
                            ...postSnap.val(),
                            postUid,
                            reportCount,
                            flaggedAt: Date.now()
                        });
                    }
                }

                myReports[postUid] = true;
                btn.textContent = '⚑ Мэдэгдсэн';
                btn.classList.add('reported');
            } catch(err) {
                btn.disabled = false;
                btn.textContent = '⚑ Мэдэгдэх';
                alert('Алдаа: ' + err.message);
            }
        }

        function openEdit(uid) {
            if (!currentUid || uid !== currentUid) return;
            const c = allCarriers[uid];
            if (!c) return;
            document.getElementById('editPhone').value       = c.phone || '';
            document.getElementById('editDescription').value = c.description || '';
            weightSlider.value      = c.maxWeight || 10;
            weightValue.textContent = c.maxWeight || 10;
            document.getElementById('editCarNumber').value  = (c.carPlate || '').match(/^\d+/)?.[0]             || '';
            document.getElementById('editCarLetters').value = (c.carPlate || '').match(/[А-ЯӨҮa-zA-Z]+$/)?.[0] || '';
            document.querySelectorAll('input[name="editDays"]').forEach(cb => {
                cb.checked = (c.days || []).includes(cb.value);
            });
            editModal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        async function deletePost(uid) {
            if (!currentUid || uid !== currentUid) return;
            if (!confirm('Энэ постыг устгах уу?')) return;
            await remove(ref(db, 'carriers/' + uid));
        }

        window.closeEditModal = function() {
            editModal.style.display = 'none';
            document.body.style.overflow = 'auto';
            editForm.reset();
        };
        window.addEventListener('click', e => { if (e.target === editModal) window.closeEditModal(); });

        editForm.addEventListener('submit', async e => {
            e.preventDefault();
            const user = auth.currentUser;
            if (!user) { alert('Нэвтэрнэ үү!'); return; }

            const now = Date.now();
            if (now - lastSave < COOLDOWN_MS) {
                const wait = Math.ceil((COOLDOWN_MS - (now - lastSave)) / 1000);
                alert(`${wait} секунд хүлээнэ үү.`);
                return;
            }

            const phone  = document.getElementById('editPhone').value.trim().replace(/\D/g, '');
            const carNum = document.getElementById('editCarNumber').value.trim().replace(/\D/g, '');
            const carLet = document.getElementById('editCarLetters').value.trim().toUpperCase().replace(/[^А-ЯӨҮ]/g, '');
            const desc   = document.getElementById('editDescription').value.trim().slice(0, 500);
            const weight = Math.min(100, Math.max(1, parseInt(weightSlider.value, 10)));
            const days   = Array.from(document.querySelectorAll('input[name="editDays"]:checked')).map(cb => cb.value);

            if (phone.length !== 8)  { alert('Утасны дугаар яг 8 орон байх ёстой!'); return; }
            if (carNum.length !== 4) { alert('Машины дугаар яг 4 цифр байх ёстой!'); return; }
            if (carLet.length !== 3) { alert('Машины үсэг яг 3 үсэг байх ёстой!'); return; }
            if (!desc)               { alert('Тайлбар оруулна уу!'); return; }
            if (!days.length)        { alert('Наад зах нь нэг өдөр сонгоно уу!'); return; }

            try {
                await set(ref(db, 'carriers/' + user.uid), {
                    phone, carPlate: carNum + carLet, description: desc,
                    maxWeight: weight, days,
                    timestamp: allCarriers[user.uid]?.timestamp || Date.now()
                });
                lastSave = Date.now();
                window.closeEditModal();
            } catch(err) {
                alert('Алдаа: ' + err.message);
            }
        });
    </script>
</body>
</html>
