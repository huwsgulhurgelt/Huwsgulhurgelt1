<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хүргэгч бүртгэл - Мөрөн</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Auth wall */
        .auth-wall {
            max-width: 400px; margin: 0 auto;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(14px);
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 22px; padding: 36px 30px;
            text-align: center; display: flex; flex-direction: column; gap: 16px;
        }
        .auth-wall h2 { font-size: 1.3rem; font-weight: 900; }
        .auth-wall p  { font-size: 0.9rem; opacity: 0.65; }
        .google-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 13px 20px; background: rgba(255,255,255,0.88); color: #333;
            border: 1.5px solid rgba(0,0,0,0.1); border-radius: 12px;
            font-size: 0.97rem; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: all 0.22s;
        }
        .google-btn:hover { background: #fff; transform: translateY(-2px); }
        .go-account {
            font-size: 0.85rem; opacity: 0.6;
        }
        .go-account a { color: inherit; font-weight: 800; }

        /* Signed-in bar */
        .user-bar {
            display: flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255,255,255,0.25);
            border-radius: 14px; padding: 12px 18px;
            margin-bottom: 4px; max-width: 560px; margin: 0 auto 16px;
        }
        .user-bar-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1rem; overflow: hidden; flex-shrink: 0;
        }
        .user-bar-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
        .user-bar-name { flex:1; font-size: 0.9rem; font-weight: 700; opacity: 0.8; }
        .user-bar-signout {
            background: none; border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 8px; padding: 5px 12px; font-size: 0.8rem;
            font-weight: 700; cursor: pointer; font-family: inherit;
            color: inherit; transition: background 0.2s;
        }
        .user-bar-signout:hover { background: rgba(255,80,80,0.15); border-color: rgba(255,80,80,0.3); color: #ff5050; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="parallax-bg">
        <div class="parallax-layer layer-1" data-speed="0.2">
            <div class="ball"></div><div class="ball"></div><div class="ball"></div><div class="ball"></div>
        </div>
        <div class="parallax-layer layer-2" data-speed="0.5">
            <div class="ball"></div><div class="ball"></div><div class="ball"></div>
        </div>
        <div class="parallax-layer layer-3" data-speed="1">
            <div class="ball"></div><div class="ball"></div><div class="ball"></div>
        </div>
    </div>

    <div class="container">
        <header class="page-header">
            <a href="index.html" class="back-link">← Буцах</a>
            <h1>Хүргэгч бүртгэл</h1>
        </header>

        <!-- Auth wall (shown when signed out) -->
        <div id="authWall">
            <div class="auth-wall">
                <div style="font-size:2.5rem;">🔐</div>
                <h2>Эхлээд нэвтэрнэ үү</h2>
                <p>Хүргэгч бүртгүүлэхийн тулд Google эсвэл и-мэйл бүртгэлээр нэвтэрнэ үү.</p>
                <button class="google-btn" id="wallGoogleBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google-ээр нэвтрэх
                </button>
                <p class="go-account">И-мэйлээр нэвтрэхийн тулд <a href="account.html">энд дарна уу</a></p>
            </div>
        </div>

        <!-- Actual form (shown when signed in) -->
        <div id="formWrap" class="hidden">

            <!-- who's signed in -->
            <div class="user-bar">
                <div class="user-bar-avatar" id="barAvatar">👤</div>
                <div class="user-bar-name" id="barName">—</div>
                <button class="user-bar-signout" id="barSignout">Гарах</button>
            </div>

            <main class="form-container">
                <form id="signupForm">
                    <div class="form-group">
                        <label for="phone">Утасны дугаар (8 орон)</label>
                        <input type="tel" id="phone" placeholder="99001122" maxlength="8" required>
                        <span class="error-message" id="phoneError"></span>
                    </div>
                    <div class="form-group">
                        <label>Машины дугаар (Жишээ: 1234ХӨВ)</label>
                        <div class="car-number-container">
                            <input type="text" id="carNumber" class="car-number-input" placeholder="1234" maxlength="4" required>
                            <input type="text" id="carLetters" class="car-letters-input" placeholder="ХӨВ" maxlength="3" required>
                        </div>
                        <span class="error-message" id="carError"></span>
                    </div>
                    <div class="form-group">
                        <label for="description">Юу хүргэж чадах вэ?</label>
                        <textarea id="description" rows="4" placeholder="Жишээ нь: Хүнс, эм, хувцас гэх мэт..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Хэдэн кг хүртэл? (<span id="weightValue">5</span> кг)</label>
                        <input type="range" id="weight" min="1" max="100" value="5" class="weight-slider">
                    </div>
                    <div class="form-group">
                        <label>Хүргэлт хийх боломжтой өдрүүд</label>
                        <div class="days-selector">
                            <label class="day-checkbox"><input type="checkbox" name="days" value="Даваа"   checked><span>Даваа</span></label>
                            <label class="day-checkbox"><input type="checkbox" name="days" value="Мягмар"  checked><span>Мягмар</span></label>
                            <label class="day-checkbox"><input type="checkbox" name="days" value="Лхагва"  checked><span>Лхагва</span></label>
                            <label class="day-checkbox"><input type="checkbox" name="days" value="Пүрэв"   checked><span>Пүрэв</span></label>
                            <label class="day-checkbox"><input type="checkbox" name="days" value="Баасан"  checked><span>Баасан</span></label>
                            <label class="day-checkbox"><input type="checkbox" name="days" value="Бямба"   checked><span>Бямба</span></label>
                            <label class="day-checkbox"><input type="checkbox" name="days" value="Ням"     checked><span>Ням</span></label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-submit">Бүртгүүлэх</button>
                </form>
            </main>
        </div>

        <footer><p>Мөрөн Хүргэлт • 2025</p></footer>
    </div>

    <script>
        window.addEventListener('scroll', function() {
            var layers = document.querySelectorAll('.parallax-layer'), s = window.pageYOffset;
            for (var i = 0; i < layers.length; i++)
                layers[i].style.transform = 'translateY(' + (-s * layers[i].dataset.speed) + 'px)';
        });
        document.getElementById('weight').oninput = function() {
            document.getElementById('weightValue').textContent = this.value;
        };
        var phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g,'');
        });
        document.getElementById('carNumber').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g,'').slice(0,4);
        });
        document.getElementById('carLetters').addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase().replace(/[^А-ЯӨҮ]/g,'').slice(0,3);
        });
    </script>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, push } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut }
            from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        const app = initializeApp({
            apiKey:"AIzaSyArvfvF1FWfqNAJnzfNiyEq0Lm2qioPIas",
            authDomain:"huwsgul-hurgelt.firebaseapp.com",
            databaseURL:"https://huwsgul-hurgelt-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId:"huwsgul-hurgelt",
            storageBucket:"huwsgul-hurgelt.firebasestorage.app",
            messagingSenderId:"457877716370",
            appId:"1:457877716370:web:5bc6e08801e36010c3d54b"
        });

        const auth     = getAuth(app);
        const db       = getDatabase(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('authWall').classList.add('hidden');
                document.getElementById('formWrap').classList.remove('hidden');
                // Fill user bar
                document.getElementById('barName').textContent = user.displayName || user.email || 'Хэрэглэгч';
                const av = document.getElementById('barAvatar');
                if (user.photoURL) av.innerHTML = `<img src="${user.photoURL}" alt="">`;
                else av.textContent = (user.displayName || user.email || '?')[0].toUpperCase();
            } else {
                document.getElementById('authWall').classList.remove('hidden');
                document.getElementById('formWrap').classList.add('hidden');
            }
        });

        document.getElementById('wallGoogleBtn').addEventListener('click', async function() {
            try { await signInWithPopup(auth, provider); }
            catch(e) { if (e.code !== 'auth/popup-closed-by-user') alert('Алдаа: ' + e.message); }
        });

        document.getElementById('barSignout').addEventListener('click', async () => {
            if (confirm('Гарах уу?')) await signOut(auth);
        });

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = auth.currentUser;
            if (!user) { alert('Эхлээд нэвтэрнэ үү!'); return; }

            const phone  = document.getElementById('phone').value.trim();
            const carNum = document.getElementById('carNumber').value.trim();
            const carLet = document.getElementById('carLetters').value.trim();
            const desc   = document.getElementById('description').value.trim();
            const weight = Number(document.getElementById('weight').value);
            const days   = Array.from(document.querySelectorAll('input[name="days"]:checked')).map(cb => cb.value);

            if (!phone || !desc || !carNum || !carLet) { alert('Бүх талбарыг бөглөнө үү!'); return; }
            if (phone.length  !== 8) { alert('Утасны дугаар 8 орон!'); return; }
            if (carNum.length !== 4) { alert('Машины дугаар 4 орон!'); return; }
            if (carLet.length !== 3) { alert('Машины үсэг 3 үсэг!'); return; }
            if (!days.length)        { alert('Наад зах нь нэг өдөр сонго!'); return; }

            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true; btn.textContent = 'Хадгалж байна...';

            try {
                await push(ref(db, 'carriers'), {
                    uid: user.uid,
                    phone, carPlate: carNum + carLet,
                    description: desc, maxWeight: weight,
                    days, timestamp: Date.now()
                });
                alert('Амжилттай бүртгэгдлээ!');
                this.reset();
                document.getElementById('weightValue').textContent = 5;
                document.querySelectorAll('input[name="days"]').forEach(cb => cb.checked = true);
            } catch(err) {
                alert('Алдаа гарлаа: ' + err.message);
            } finally {
                btn.disabled = false; btn.textContent = 'Бүртгүүлэх';
            }
        });
    </script>
</body>
</html>
