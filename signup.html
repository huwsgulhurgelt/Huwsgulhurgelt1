<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хүргэгч бүртгэл - Мөрөн</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="worm-bg">
        <svg id="wormSvg" viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="container">
        <header class="page-header">
            <a href="index.html" class="back-link">← Буцах</a>
            <h1>Хүргэгч бүртгэл</h1>
        </header>

        <main class="form-container">
            <form id="signupForm">

                <div class="form-group">
                    <label for="phone">Утасны дугаар (8 орон)</label>
                    <input type="tel" id="phone" placeholder="99001122" maxlength="8" required>
                    <span class="error-message" id="phoneError"></span>
                </div>

                <div class="form-group">
                    <label>Машины дугаар (Жишээ: 1234ХӨВ)</label>
                    <div class="car-number-container">
                        <input type="text" id="carNumber" class="car-number-input" placeholder="1234" maxlength="4" required>
                        <input type="text" id="carLetters" class="car-letters-input" placeholder="ХӨВ" maxlength="3" required>
                    </div>
                    <span class="error-message" id="carError"></span>
                </div>

                <div class="form-group">
                    <label for="description">Юу хүргэж чадах вэ?</label>
                    <textarea id="description" rows="4" placeholder="Жишээ нь: Хүнс, эм, хувцас гэх мэт..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="weight">Хэдэн кг хүртэл? (<span id="weightValue">5</span> кг)</label>
                    <input type="range" id="weight" min="1" max="50" value="5" class="weight-slider">
                </div>

                <div class="form-group">
                    <label for="pin">PIN код (засах, устгахад)</label>
                    <input type="password" id="pin" placeholder="4 оронтой тоо" maxlength="4" required>
                    <span class="error-message" id="pinError"></span>
                </div>

                <div class="form-group">
                    <label>Хүргэлт хийх боломжтой өдрүүд</label>
                    <div class="days-selector">
                        <label class="day-checkbox"><input type="checkbox" name="days" value="Даваа" checked><span>Даваа</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="days" value="Мягмар" checked><span>Мягмар</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="days" value="Лхагва" checked><span>Лхагва</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="days" value="Пүрэв" checked><span>Пүрэв</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="days" value="Баасан" checked><span>Баасан</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="days" value="Бямба" checked><span>Бямба</span></label>
                        <label class="day-checkbox"><input type="checkbox" name="days" value="Ням" checked><span>Ням</span></label>
                    </div>
                </div>

                <button type="submit" class="btn btn-submit">Бүртгүүлэх</button>
            </form>
        </main>

        <footer>
            <p>im watchin you</p>
        </footer>
    </div>

    <style>
        @keyframes wormWave {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(0.44); }
        }
    </style>

    <script>
        // worm bg same as other pages
        var svg3 = document.getElementById('wormSvg')
        for (var wi = 0; wi < 10; wi++) {
            var wd = Math.abs(wi - 4.5)
            var wc = document.createElementNS('http://www.w3.org/2000/svg', 'circle')
            wc.setAttribute('cx', 150)
            wc.setAttribute('cy', 24 + wi * 42)
            wc.setAttribute('r', 28 + wd * 15)
            wc.setAttribute('fill', 'none')
            wc.setAttribute('stroke', 'white')
            wc.setAttribute('stroke-width', '0.85')
            wc.style.cssText = 'animation: wormWave 4.8s ease-in-out ' + (wi * 0.48) + 's infinite; transform-box: fill-box; transform-origin: center center;'
            svg3.appendChild(wc)
        }

        // weight slider
        var weightInput = document.getElementById('weight')
        var weightValue = document.getElementById('weightValue')
        weightInput.oninput = function() { weightValue.textContent = this.value }

        // phone validation
        var phoneInput = document.getElementById('phone')
        var phoneError = document.getElementById('phoneError')
        phoneInput.addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '')
            if (e.target.value.length > 8) e.target.value = e.target.value.slice(0, 8)
            phoneError.style.display = (e.target.value.length > 0 && e.target.value.length < 8) ? 'block' : 'none'
            phoneError.textContent = '8 оронтой тоо байх ёстой'
        })

        // car number
        var carNumInput = document.getElementById('carNumber')
        var carLetInput = document.getElementById('carLetters')
        var carError    = document.getElementById('carError')

        carNumInput.addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4)
            checkCar()
        })

        // cyrillic only auto caps
        carLetInput.addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase().replace(/[^А-ЯӨҮ]/g, '').slice(0, 3)
            checkCar()
        })

        function checkCar() {
            var n = carNumInput.value, l = carLetInput.value
            var bad = (n.length > 0 && n.length < 4) || (l.length > 0 && l.length < 3)
            carError.style.display = bad ? 'block' : 'none'
            carError.textContent = 'Машины дугаар бүрэн биш байна'
            return !bad
        }

        // pin
        var pinInput = document.getElementById('pin')
        var pinError = document.getElementById('pinError')
        pinInput.addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4)
            pinError.style.display = (e.target.value.length > 0 && e.target.value.length < 4) ? 'block' : 'none'
            pinError.textContent = 'PIN код 4 оронтой тоо байх ёстой'
        })
    </script>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js'
        import { getDatabase, ref, push } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js'

        const cfg = {
            apiKey: "AIzaSyArvfvF1FWfqNAJnzfNiyEq0Lm2qioPIas",
            authDomain: "huwsgul-hurgelt.firebaseapp.com",
            databaseURL: "https://huwsgul-hurgelt-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "huwsgul-hurgelt",
            storageBucket: "huwsgul-hurgelt.firebasestorage.app",
            messagingSenderId: "457877716370",
            appId: "1:457877716370:web:5bc6e08801e36010c3d54b"
        }

        const app = initializeApp(cfg)
        const db  = getDatabase(app)

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault()

            var phone  = document.getElementById('phone').value.trim()
            var carNum = document.getElementById('carNumber').value.trim()
            var carLet = document.getElementById('carLetters').value.trim()
            var desc   = document.getElementById('description').value.trim()
            var weight = Number(document.getElementById('weight').value)
            var pin    = document.getElementById('pin').value.trim()
            var days   = []
            document.querySelectorAll('input[name="days"]:checked').forEach(function(cb) { days.push(cb.value) })

            if (!phone || !desc || !pin || !carNum || !carLet) { alert('Бүх талбарыг бөглөнө үү!'); return }
            if (phone.length !== 8)  { alert('Утасны дугаар 8 орон!'); return }
            if (carNum.length !== 4) { alert('Машины дугаар 4 орон!'); return }
            if (carLet.length !== 3) { alert('Машины үсэг 3 үсэг!'); return }
            if (pin.length !== 4)    { alert('PIN 4 орон!'); return }
            if (!days.length)        { alert('Наад зах нь нэг өдөр сонго!'); return }

            try {
                await push(ref(db, 'carriers'), {
                    phone: phone, carPlate: carNum + carLet, description: desc,
                    maxWeight: weight, days: days, pin: pin, timestamp: Date.now()
                })
                alert('Амжилттай бүртгэгдлээ!')
                e.target.reset()
                document.getElementById('weightValue').textContent = 5
                document.querySelectorAll('input[name="days"]').forEach(function(cb) { cb.checked = true })
            } catch(err) {
                alert('Алдаа гарлаа: ' + err.message)
            }
        })
    </script>
</body>
</html>
